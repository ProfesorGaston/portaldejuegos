<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pescador de Especies - Prof. Gastón</title>
    
    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js"></script>

    <style>
        :root {
            --sea-bg: #00a8ff;
            --panel: #ffffff;
            --primary: #0c2461;
            --correct: #44bd32;
            --wrong: #e84118;
            --highlight: #f6b93b;
        }

        body {
            background-color: #3c6382;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none;
        }

        /* ESTILOS PARA LAS IMÁGENES DE TWEMOJI */
        img.emoji {
            width: 1em; 
            height: 1em;
            pointer-events: none; 
            margin: 0;
            vertical-align: -0.1em;
        }

        /* --- FULLSCREEN --- */
        #game-container {
            background: linear-gradient(to bottom, #82ccdd, #60a3bc, #1e3799); /* Profundidad del mar */
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- UI SUPERIOR --- */
        #ui-layer {
            height: 90px;
            background: rgba(255,255,255,0.95);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            z-index: 10;
            border-bottom: 5px solid #0a3d62;
        }

        .stat-box {
            font-size: 1.4rem;
            color: var(--primary);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #target-display {
            background: #dff9fb;
            padding: 5px 25px;
            border-radius: 50px;
            border: 3px solid var(--primary);
            font-weight: bold;
            display: flex;
            flex-direction: column; 
            align-items: center;
            line-height: 1;
        }

        #target-label { font-size: 0.8rem; color: #666; margin-bottom: 2px; }
        
        #target-content { 
            display: flex; align-items: center; gap: 10px; 
            font-size: 1.5rem; color: var(--primary);
        }
        
        #target-icon { 
            font-size: 2.5rem; 
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2)); 
        }

        /* --- ZONA DE JUEGO --- */
        #sea-area {
            flex-grow: 1;
            position: relative;
            cursor: none; 
            background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.1) 100%);
        }

        /* --- DETALLE EXTRA: ALGAS ANIMADAS Y BURBUJEO --- */
        #seaweed-container {
            position: absolute;
            bottom: -20px;
            width: 100%;
            height: 100px;
            pointer-events: none;
            z-index: 2;
        }

        .seaweed {
            position: absolute;
            font-size: 120px;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
        }

        @keyframes sway {
            0% { transform: rotate(-12deg); }
            100% { transform: rotate(12deg); }
        }

        /* Detalle: Burbujeo suave constante del fondo */
        #constant-bubbles {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .wobble-b {
            position: absolute;
            width: 30px; height: 30px;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(135, 206, 235, 0.4));
            border-radius: 50%;
            opacity: 0.6;
            animation: rise 5s linear infinite;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }

        /* --- PECES --- */
        .bubble {
            position: absolute;
            width: 80px; height: 80px; 
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(135, 206, 235, 0.4));
            border: 2px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 3.5rem; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: wobble 3s ease-in-out infinite;
            user-select: none;
            z-index: 3;
        }

        @keyframes wobble {
            0%, 100% { transform: translateX(0) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
        }

        /* --- SISTEMA DE PESCA REDISEÑADO --- */
        #fishing-rig {
            position: absolute;
            top: 0;
            transform: translateX(-50%); 
            display: flex;
            flex-direction: column; 
            align-items: center;    
            pointer-events: none;
            z-index: 5;
        }

        #boat {
            font-size: 180px; /* Barco al triple */
            margin-bottom: -15px;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
        }

        #hook-line {
            width: 3px; 
            background: #dfe6e9;
            box-shadow: 1px 0 3px rgba(0,0,0,0.5);
        }

        #hook {
            font-size: 45px;
            line-height: 1; 
            margin-top: -4px; 
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        /* --- PANTALLAS --- */
        #menu, #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 61, 98, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 20; text-align: center;
            color: white;
        }

        h1 { font-size: 4rem; margin-bottom: 10px; text-shadow: 0 4px 0 #000; color: #fab1a0; }
        p { font-size: 1.5rem; margin-bottom: 30px; color: #dfe6e9; }

        .btn {
            padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            background: #fab1a0; color: #2d3436;
            border: none; border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #e17055;
            transition: transform 0.1s;
            margin: 10px;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #e17055; }

        #watermark {
            position: absolute; bottom: 10px; right: 20px;
            font-size: 14px; color: rgba(255,255,255,0.6); z-index: 30;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="stat-box">⭐ <span id="score">0</span></div>
        
        <div id="target-display">
            <span id="target-label">¡PESCA ESTE!</span>
            <div id="target-content">
                <span id="target-icon">🐠</span> 
                <span id="target-name">Nemo</span>
            </div>
        </div>
        
        <div class="stat-box">❤️ <span id="lives">3</span></div>
        <div class="stat-box">⏱️ <span id="time">60</span></div>
    </div>

    <div id="sea-area">
        <div id="constant-bubbles">
            <div class="wobble-b" style="left: 10%; animation-delay: 0s;"></div>
            <div class="wobble-b" style="left: 30%; animation-delay: 2s;"></div>
            <div class="wobble-b" style="left: 55%; animation-delay: 1s;"></div>
            <div class="wobble-b" style="left: 80%; animation-delay: 3s;"></div>
            <div class="wobble-b" style="left: 95%; animation-delay: 4s;"></div>
        </div>

        <div id="seaweed-container">
            <div class="seaweed" style="left: 5%; animation-delay: 0s;">🌿</div>
            <div class="seaweed" style="left: 25%; animation-delay: 0.5s;">🌿</div>
            <div class="seaweed" style="left: 65%; animation-delay: 1.2s;">🌿</div>
            <div class="seaweed" style="left: 85%; animation-delay: 0.3s;">🌿</div>
        </div>

        <div id="fishing-rig">
            <div id="boat">⛵</div>
            <div id="hook-line"></div>
            <div id="hook">⚓</div>
        </div>
        
        <div id="bubbles-container"></div>
    </div>

    <div id="menu">
        <h1>🎣 PESCA MARINA</h1>
        <p>Atrapa solo el pez que se indica</p>
        <div>
            <button class="btn" onclick="startGame('easy')">Fácil</button>
            <button class="btn" onclick="startGame('normal')">Normal</button>
            <button class="btn" onclick="startGame('hard')">Experto</button>
        </div>
    </div>

    <div id="overlay" style="display: none;">
        <h1 id="overlay-title">¡TIEMPO!</h1>
        <div id="overlay-emoji" style="font-size: 100px; margin: 20px;">⏰</div>
        <p id="overlay-msg">Puntaje final: 0</p>
        <button class="btn" onclick="closeOverlay()">Continuar</button>
    </div>

    <div id="watermark">Creado por el Prof. Gastón</div>
</div>

<script>
    // --- BASE DE DATOS DE ESPECIES MARINAS ---
    const seaCreatures = [
        { icon: "🐠", name: "Pez Tropical" },
        { icon: "🐡", name: "Pez Globo" },
        { icon: "🐙", name: "Pulpo" },
        { icon: "🦀", name: "Cangrejo" },
        { icon: "🦑", name: "Calamar" },
        { icon: "🦈", name: "Tiburón" },
        { icon: "🐬", name: "Delfín" },
        { icon: "🐳", name: "Ballena" },
        { icon: "🐢", name: "Tortuga" },
        { icon: "🐧", name: "Pingüino" }, 
        { icon: "🐚", name: "Caracol" },
        { icon: "🦐", name: "Camarón" },
        { icon: "🐟", name: "Pez Azul" }
    ];

    let currentLevel = 0;
    let score = 0;
    let lives = 3; 
    let timeLeft = 60;
    let gameInterval, bubbleInterval;
    let bubbles = [];
    let gameActive = false;
    let difficultySpeed = 2; 
    let spawnRate = 1000;
    
    const seaArea = document.getElementById('sea-area');
    const rig = document.getElementById('fishing-rig');
    const hookLine = document.getElementById('hook-line');
    const hook = document.getElementById('hook'); 
    let hookX = 300;

    // Función para renderizar Twemoji
    function renderEmojis(element) {
        twemoji.parse(element || document.body, {
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
        });
    }

    // Renderizar al cargar la página
    renderEmojis();

    // --- SISTEMA DE AUDIO ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'catch') { 
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        } else if (type === 'wrong') { 
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(50, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'win') { 
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, now); 
            osc.frequency.setValueAtTime(659.25, now + 0.15); 
            osc.frequency.setValueAtTime(783.99, now + 0.3); 
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        } else if (type === 'lose') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.8);
            osc.start(now); osc.stop(now + 0.8);
        }
    }

    window.addEventListener('click', initAudio, { once: true });

    function startGame(diff) {
        initAudio();
        document.getElementById('menu').style.display = 'none';
        
        if (diff === 'easy') { difficultySpeed = 1.5; spawnRate = 1300; }
        if (diff === 'normal') { difficultySpeed = 2.5; spawnRate = 1000; }
        if (diff === 'hard') { difficultySpeed = 4; spawnRate = 700; }

        currentLevel = 0;
        seaCreatures.sort(() => Math.random() - 0.5);
        startLevel();
    }

    function startLevel() {
        score = 0;
        timeLeft = 60;
        lives = 3; 
        bubbles = [];
        gameActive = true;
        document.getElementById('bubbles-container').innerHTML = '';
        
        const target = seaCreatures[currentLevel];
        document.getElementById('target-icon').innerText = target.icon;
        document.getElementById('target-name').innerText = target.name;
        
        updateUI();
        renderEmojis(document.getElementById('ui-layer'));

        clearInterval(gameInterval);
        clearInterval(bubbleInterval);
        
        gameInterval = setInterval(updateGame, 20);
        bubbleInterval = setInterval(createBubble, spawnRate);
    }

    function updateUI() {
        document.getElementById('score').innerText = score;
        document.getElementById('time').innerText = timeLeft;
        document.getElementById('lives').innerText = lives;
    }

    seaArea.addEventListener('mousemove', (e) => {
        const rect = seaArea.getBoundingClientRect();
        hookX = e.clientX - rect.left;
        
        // Ajustamos los topes para que no se salga de la pantalla
        if (hookX < 40) hookX = 40;
        if (hookX > rect.width - 40) hookX = rect.width - 40;

        rig.style.left = hookX + 'px'; 
        hookLine.style.height = '150px'; // Línea un poco más larga por el fullscreen
    });

    function createBubble() {
        if (!gameActive) return;

        const b = document.createElement('div');
        b.className = 'bubble'; 
        
        let creature;
        if (Math.random() < 0.4) {
            creature = seaCreatures[currentLevel];
        } else {
            let randomIdx;
            do {
                randomIdx = Math.floor(Math.random() * seaCreatures.length);
            } while (randomIdx === currentLevel);
            creature = seaCreatures[randomIdx];
        }
        
        b.innerText = creature.icon;
        
        const startX = Math.random() * (seaArea.offsetWidth - 80);
        b.style.left = startX + 'px';
        b.style.bottom = '-80px'; 

        document.getElementById('bubbles-container').appendChild(b);
        renderEmojis(b); // Convertimos el emoji a color inmediatamente
        
        bubbles.push({
            el: b,
            x: startX,
            y: -80,
            speed: difficultySpeed + Math.random(), 
            icon: creature.icon 
        });
    }

    function updateGame() {
        if (!gameActive) return;

        if (Math.random() < 0.02) { 
            timeLeft--;
            updateUI();
            if (timeLeft <= 0) gameOver("time");
        }

        for (let i = bubbles.length - 1; i >= 0; i--) {
            let bubble = bubbles[i];
            bubble.y += bubble.speed;
            bubble.el.style.bottom = bubble.y + 'px';

            const hookRect = hook.getBoundingClientRect();
            const bubbleRect = bubble.el.getBoundingClientRect();

            if (
                hookRect.left < bubbleRect.right &&
                hookRect.right > bubbleRect.left &&
                hookRect.top < bubbleRect.bottom &&
                hookRect.bottom > bubbleRect.top
            ) {
                checkCatch(bubble, i);
            }

            if (bubble.y > seaArea.offsetHeight + 60) {
                bubble.el.remove();
                bubbles.splice(i, 1);
            }
        }
    }

    function checkCatch(bubble, index) {
        const targetIcon = seaCreatures[currentLevel].icon;
        
        bubble.el.remove();
        bubbles.splice(index, 1);

        if (bubble.icon === targetIcon) {
            score += 10;
            playSound('catch');
            updateUI();
            
            if (score >= 100) {
                levelWin();
            }
        } else {
            lives--;
            playSound('wrong');
            updateUI();

            document.getElementById('game-container').style.borderColor = '#e84118';
            setTimeout(() => {
                document.getElementById('game-container').style.borderColor = 'transparent';
            }, 200);

            if (lives <= 0) {
                gameOver("lives");
            }
        }
    }

    function levelWin() {
        gameActive = false;
        clearInterval(gameInterval); clearInterval(bubbleInterval);
        playSound('win');
        
        if (currentLevel < seaCreatures.length - 1) {
            showOverlay("¡EXCELENTE!", "¡Atrapaste todos los " + seaCreatures[currentLevel].name + "s!", "🌟", true);
        } else {
            showOverlay("¡INCREÍBLE!", "¡Eres un maestro pescador!", "🏆", true);
        }
    }

    function gameOver(reason) {
        gameActive = false;
        clearInterval(gameInterval); clearInterval(bubbleInterval);
        playSound('lose'); 
        
        let msg = "Se acabó el tiempo.";
        if (reason === "lives") msg = "¡Se rompieron las redes! (0 Vidas)";

        showOverlay("¡FIN DEL JUEGO!", msg, "😢", false);
    }

    function showOverlay(title, msg, emoji, success) {
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-msg').innerText = msg;
        document.getElementById('overlay-emoji').innerText = emoji;
        renderEmojis(document.getElementById('overlay'));
        
        const btn = document.querySelector('#overlay button');
        
        if (success) {
            if (currentLevel < seaCreatures.length - 1) {
                 btn.innerText = "Siguiente Especie";
                 btn.onclick = () => {
                     closeOverlay();
                     currentLevel++;
                     startLevel();
                 };
            } else {
                btn.innerText = "Menú Principal";
                btn.onclick = () => {
                    closeOverlay();
                    document.getElementById('menu').style.display = 'flex';
                };
            }
        } else {
            btn.innerText = "Reintentar Nivel";
            btn.onclick = () => {
                closeOverlay();
                startLevel(); 
            };
        }
        
        document.getElementById('overlay').style.display = 'flex';
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
    }

</script>
</body>
</html>
