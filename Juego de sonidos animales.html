<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién suena? - Prof. Gastón</title>

    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js"></script>

    <style>
        :root {
            --bg: #fdf2f2;
            --panel: #ffffff;
            --primary: #9b59b6;
            --accent: #8e44ad;
            --correct: #27ae60;
            --wrong: #e74c3c;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; /* Evita arrastre en pantallas táctiles */
        }

        /* Contenedor a Pantalla Completa (Sin bordes limitantes) */
        #game-container {
            background: var(--panel);
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 24px 24px 78px 24px; /* Aumentado 20% */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
        }

        /* Barra de progreso aumentada 20% */
        #progress-wrapper {
            width: 90%; 
            max-width: 800px;
            height: 24px; 
            background: #eee;
            border-radius: 14px;
            margin-bottom: 18px;
            border: 4px solid #ddd;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%; height: 100%;
            background: var(--correct);
            transition: width 0.4s;
        }

        /* Textos aumentados 20% */
        #message { font-size: 1.9rem; font-weight: bold; height: 54px; color: #555; margin-bottom: 6px; }

        /* Botón de Sonido aumentado 20% */
        #sound-btn {
            background: #f1c40f;
            border: none;
            width: 144px;
            height: 144px;
            border-radius: 50%;
            font-size: 72px;
            cursor: pointer;
            box-shadow: 0 10px 0 #f39c12;
            margin: 12px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
        }

        #sound-btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #f39c12; }

        #options-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 18px; /* Aumentado 20% */
            margin-top: 24px;
            width: 90%;
            max-width: 800px;
        }

        /* Opciones de animales aumentadas 20% */
        .btn-picto {
            background: #fff;
            border: 5px solid #dcdde1;
            border-radius: 24px;
            font-size: 66px;
            padding: 14px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 7px 0 #bdc3c7;
            min-width: 120px;
        }

        .btn-picto:hover { transform: scale(1.05); border-color: var(--primary); }

        /* ESTILOS PARA LAS IMÁGENES DE TWEMOJI */
        img.emoji {
            width: 1em; 
            height: 1em;
            pointer-events: none; 
            margin: 0;
            vertical-align: -0.1em;
        }

        /* Cartel de Finalizado (Todo +20%) */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #overlay-emoji { font-size: 7.2rem; line-height: 1; margin-bottom: 24px; }
        #overlay-title { font-size: 3.6rem; color: var(--primary); margin: 12px; font-weight: bold; }
        #overlay p { font-size: 1.8rem; color: #333; }
        #overlay button {
            padding: 18px 48px; font-size: 1.8rem;
            background: var(--correct); color: white;
            border: none; border-radius: 24px; cursor: pointer;
            box-shadow: 0 7px 0 #2d8a24;
            margin-top: 24px;
            transition: transform 0.1s;
        }
        
        #overlay button:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        #credits {
            position: absolute;
            bottom: 18px;
            right: 30px;
            font-size: 1.1rem;
            color: #7f8c8d;
            font-style: italic;
            font-weight: bold;
            pointer-events: none;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-12px); }
            75% { transform: translateX(12px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="progress-wrapper"><div id="progress-bar"></div></div>
    <div id="message">¡Toca para escuchar!</div>
    
    <button id="sound-btn" onclick="reproducir()">🔊</button>

    <div id="options-container"></div>

    <div id="overlay">
        <div id="overlay-emoji">🏆</div>
        <div id="overlay-title">¡INCREÍBLE!</div>
        <p id="overlay-msg">Eres un experto en sonidos.</p>
        <button onclick="reiniciarJuego()">Jugar de nuevo</button>
    </div>

    <div id="credits">Creado por el Prof. Gastón</div>
</div>

<audio id="player"></audio>

<script>
    let etapa = 0;
    const etapasMeta = 10;
    let animalCorrecto = null;
    let animalesDisponibles = [];
    const player = document.getElementById('player');

    const listaAnimales = [
        { picto: '🐱', audio: 'gato.mp3' },
        { picto: '🐶', audio: 'perro.mp3' },
        { picto: '🐥', audio: 'pollito.mp3' },
        { picto: '🐄', audio: 'vaca.mp3' },
        { picto: '🐑', audio: 'oveja.mp3' },
        { picto: '🐖', audio: 'chancho.mp3' },
        { picto: '🐺', audio: 'lobo.mp3' },
        { picto: '🐔', audio: 'gallina.mp3' },
        { picto: '🐻', audio: 'oso.mp3' },
        { picto: '🦜', audio: 'loro.mp3' },
        { picto: '🦁', audio: 'leon.mp3' }
    ];

    // Función para renderizar los Emojis a color
    function renderEmojis() {
        twemoji.parse(document.body, {
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
        });
    }

    function reproducir() {
        if (animalCorrecto) {
            player.src = animalCorrecto.audio;
            player.load(); 
            player.play().catch(e => console.log("Error de audio:", e));
            document.getElementById('message').innerText = "¿Quién es?";
        }
    }

    function nuevaRonda() {
        if (etapa >= etapasMeta) {
            document.getElementById('overlay').style.display = 'flex';
            return;
        }

        document.getElementById('progress-bar').style.width = (etapa * (100/etapasMeta)) + "%";
        
        if (animalesDisponibles.length === 0) {
            animalesDisponibles = [...listaAnimales];
        }
        const indiceAzar = Math.floor(Math.random() * animalesDisponibles.length);
        animalCorrecto = animalesDisponibles[indiceAzar];
        animalesDisponibles.splice(indiceAzar, 1); 

        let otros = listaAnimales.filter(a => a.picto !== animalCorrecto.picto);
        otros.sort(() => Math.random() - 0.5);
        let distractores = otros.slice(0, 4);

        let opcionesFinales = [animalCorrecto, ...distractores].sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        opcionesFinales.forEach(a => {
            const btn = document.createElement('button');
            btn.className = 'btn-picto';
            btn.innerText = a.picto;
            
            // Pasamos el objeto original "a" a la validación
            btn.onclick = () => validar(a); 
            container.appendChild(btn);
        });

        document.getElementById('message').innerText = "¡Toca para escuchar!";
        document.getElementById('message').style.color = "#555";
        
        // Renderizamos los nuevos emojis a color después de crear los botones
        renderEmojis();
    }

    function validar(elegido) {
        if (elegido.picto === animalCorrecto.picto) {
            document.getElementById('message').innerText = "¡SÍ! ✨";
            document.getElementById('message').style.color = "var(--correct)";
            etapa++;
            
            // Renderizamos el destello mágico del texto
            renderEmojis();
            
            setTimeout(nuevaRonda, 1200);
        } else {
            document.getElementById('message').innerText = "¡Intenta de nuevo! 👂";
            document.getElementById('message').style.color = "var(--wrong)";
            document.getElementById('game-container').classList.add('shake');
            
            // Renderizamos la oreja del texto
            renderEmojis();
            
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            reproducir();
        }
    }

    function reiniciarJuego() {
        etapa = 0;
        animalesDisponibles = [];
        document.getElementById('overlay').style.display = 'none';
        nuevaRonda();
    }

    // Arrancamos el juego y renderizamos los emojis estáticos (el parlante y el trofeo)
    nuevaRonda();
    renderEmojis();
</script>
</body>
</html>
