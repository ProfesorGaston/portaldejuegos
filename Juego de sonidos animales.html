<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién suena? - Prof. Gastón (Vibrante)</title>

    <script src="https://unpkg.com/twemoji@14.0.2/dist/twemoji.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">

    <style>
        :root {
            var(--bg-sky): #ade8f4; 
            --panel: #ffffff;
            --primary: #9b59b6; 
            --accent: #f1c40f;  
            --correct: #2ecc71; 
            --wrong: #e74c3c;   
            --shadow-btn: #f39c12; 
            --border-bubble: #8e44ad;
        }

        body {
            background-color: #ade8f4; /* Cielo azul brillante */
            font-family: 'Fredoka One', cursive; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; 
            
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 20%),
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 30%);
        }

        #game-container {
            background: var(--panel);
            width: 100vw;
            height: 100vh;
            box-sizing: border-box;
            padding: 30px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            text-align: center;
            
            border-radius: 50px;
            border: 10px solid rgba(255, 255, 255, 0.5); 
        }

        #progress-wrapper {
            width: 90%; 
            max-width: 800px;
            height: 30px; 
            background: #eee;
            border-radius: 20px;
            margin-bottom: 22px;
            border: 5px solid #ddd;
            overflow: hidden;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        #progress-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #2ecc71 0%, #2ecc71 100%);
            transition: width 0.4s;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.1); 
        }

        #message { font-size: 2.3rem; font-weight: bold; height: 65px; color: #555; margin-bottom: 8px; }

        /* Botón de Sonido con animación de onda sonora (resplandor) */
        #sound-btn {
            background: radial-gradient(circle, #f1c40f 0%, #f39c12 100%); 
            border: 6px solid #fff;
            width: 172px; 
            height: 172px;
            border-radius: 50%;
            font-size: 86px;
            cursor: pointer;
            margin: 15px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
            position: relative;
            animation: ondaSonora 2s infinite;
        }

        /* Detalle visual nuevo: Una onda expansiva que invita a tocar el botón */
        @keyframes ondaSonora {
            0% { box-shadow: 0 10px 0 #f39c12, 0 0 0 0 rgba(241, 196, 15, 0.7); }
            70% { box-shadow: 0 10px 0 #f39c12, 0 0 0 40px rgba(241, 196, 15, 0); }
            100% { box-shadow: 0 10px 0 #f39c12, 0 0 0 0 rgba(241, 196, 15, 0); }
        }

        #sound-btn:active { 
            transform: translateY(6px); 
            animation: none; /* Detenemos la onda al pulsarlo */
            box-shadow: 0 4px 0 #f39c12; 
        }

        /* Contenedor principal de opciones en forma de columna */
        #options-container {
            display: flex;
            flex-direction: column; /* Para poner una fila debajo de la otra */
            align-items: center;
            gap: 22px; 
            margin-top: 30px;
            width: 90%;
            max-width: 800px;
        }

        /* Las filas internas para los botones */
        .options-row {
            display: flex;
            justify-content: center;
            gap: 22px;
        }

        .btn-picto {
            background: #fff;
            border: 6px solid var(--border-bubble); 
            border-radius: 30px;
            font-size: 80px; 
            padding: 18px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 8px 15px rgba(155, 89, 182, 0.3); 
            min-width: 144px;
        }

        .btn-picto:hover { transform: scale(1.05); border-color: var(--correct); }

        img.emoji {
            width: 1em; 
            height: 1em;
            pointer-events: none; 
            margin: 0;
            vertical-align: -0.1em;
        }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #overlay-emoji { font-size: 8.6rem; line-height: 1; margin-bottom: 30px; }
        #overlay-title { font-size: 4.3rem; color: var(--primary); margin: 15px; font-weight: bold; }
        #overlay p { font-size: 2.2rem; color: #333; }
        
        #overlay button {
            padding: 22px 60px; font-size: 2.2rem;
            background: var(--correct); color: white;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 9px 0 #2d8a24;
            margin-top: 30px;
            transition: transform 0.1s;
        }
        
        #overlay button:active {
            transform: translateY(7px);
            box-shadow: none;
        }

        #credits {
            position: absolute;
            bottom: 22px;
            right: 36px;
            font-size: 1.3rem;
            color: #7f8c8d;
            font-style: italic;
            font-weight: bold;
            pointer-events: none;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-14px); }
            75% { transform: translateX(14px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="progress-wrapper"><div id="progress-bar"></div></div>
    <div id="message">¡Toca para escuchar!</div>
    
    <button id="sound-btn" onclick="reproducir()">🔊</button>

    <div id="options-container">
        </div>

    <div id="overlay">
        <div id="overlay-emoji">🏆</div>
        <div id="overlay-title">¡INCREÍBLE!</div>
        <p id="overlay-msg">Eres un experto en sonidos.</p>
        <button onclick="reiniciarJuego()">Jugar de nuevo</button>
    </div>

    <div id="credits">Creado por el Prof. Gastón</div>
</div>

<audio id="player"></audio>

<script>
    let etapa = 0;
    const etapasMeta = 10;
    let animalCorrecto = null;
    let animalesDisponibles = [];
    let bloqueado = false; 
    const player = document.getElementById('player');

    const listaAnimales = [
        { picto: '🐱', audio: 'gato.mp3' },
        { picto: '🐶', audio: 'perro.mp3' },
        { picto: '🐥', audio: 'pollito.mp3' },
        { picto: '🐄', audio: 'vaca.mp3' },
        { picto: '🐑', audio: 'oveja.mp3' },
        { picto: '🐖', audio: 'chancho.mp3' },
        { picto: '🐺', audio: 'lobo.mp3' },
        { picto: '🐔', audio: 'gallina.mp3' },
        { picto: '🐻', audio: 'oso.mp3' },
        { picto: '🦜', audio: 'loro.mp3' },
        { picto: '🦁', audio: 'leon.mp3' }
    ];

    function renderEmojis() {
        twemoji.parse(document.body, {
            base: 'https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/'
        });
    }

    function reproducir() {
        if (animalCorrecto) {
            player.src = animalCorrecto.audio;
            player.load(); 
            player.play().catch(e => console.log("Error de audio:", e));
            document.getElementById('message').innerText = "¿Quién es?";
        }
    }

    function nuevaRonda() {
        bloqueado = false; 

        if (etapa >= etapasMeta) {
            document.getElementById('overlay').style.display = 'flex';
            return;
        }

        document.getElementById('progress-bar').style.width = (etapa * (100/etapasMeta)) + "%";
        
        if (animalesDisponibles.length === 0) {
            animalesDisponibles = [...listaAnimales];
        }
        const indiceAzar = Math.floor(Math.random() * animalesDisponibles.length);
        animalCorrecto = animalesDisponibles[indiceAzar];
        animalesDisponibles.splice(indiceAzar, 1); 

        let otros = listaAnimales.filter(a => a.picto !== animalCorrecto.picto);
        otros.sort(() => Math.random() - 0.5);
        let distractores = otros.slice(0, 4);

        // Tenemos 5 opciones totales (1 correcto + 4 distractores)
        let opcionesFinales = [animalCorrecto, ...distractores].sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        
        // Creamos la estructura de 2 filas
        container.innerHTML = `
            <div class="options-row" id="row-1"></div>
            <div class="options-row" id="row-2"></div>
        `;

        opcionesFinales.forEach((a, index) => {
            const btn = document.createElement('button');
            btn.className = 'btn-picto';
            btn.innerText = a.picto;
            btn.onclick = () => validar(a); 
            
            // Los primeros 2 animales van a la fila 1, los otros 3 a la fila 2
            if (index < 2) {
                document.getElementById('row-1').appendChild(btn);
            } else {
                document.getElementById('row-2').appendChild(btn);
            }
        });

        document.getElementById('message').innerText = "¡Toca para escuchar!";
        document.getElementById('message').style.color = "#555";
        
        renderEmojis();
    }

    function validar(elegido) {
        if (bloqueado) return; 

        if (elegido.picto === animalCorrecto.picto) {
            bloqueado = true; 
            document.getElementById('message').innerText = "¡SÍ! ✨";
            document.getElementById('message').style.color = "var(--correct)";
            etapa++;
            
            renderEmojis();
            
            setTimeout(nuevaRonda, 1200);
        } else {
            bloqueado = true; 
            document.getElementById('message').innerText = "¡Intenta de nuevo! 👂";
            document.getElementById('message').style.color = "var(--wrong)";
            document.getElementById('game-container').classList.add('shake');
            
            renderEmojis();
            
            setTimeout(() => {
                document.getElementById('game-container').classList.remove('shake');
                bloqueado = false; 
            }, 400);
            
            reproducir();
        }
    }

    function reiniciarJuego() {
        etapa = 0;
        animalesDisponibles = [];
        document.getElementById('overlay').style.display = 'none';
        nuevaRonda();
    }

    nuevaRonda();
    renderEmojis();
</script>
</body>
</html>
