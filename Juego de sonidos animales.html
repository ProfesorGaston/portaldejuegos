<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quién suena? - Prof. Gastón</title>
    <style>
        :root {
            --bg: #fdf2f2;
            --panel: #ffffff;
            --primary: #9b59b6;
            --accent: #8e44ad;
            --correct: #27ae60;
            --wrong: #e74c3c;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            background: var(--panel);
            width: 90%;
            max-width: 650px;
            padding: 20px 20px 65px 20px;
            border-radius: 40px;
            border: 8px solid var(--primary);
            box-shadow: 0 10px 0 #5b2c6f;
            text-align: center;
            position: relative;
        }

        #progress-wrapper {
            width: 100%; height: 20px;
            background: #eee;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 3px solid #ddd;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%; height: 100%;
            background: var(--correct);
            transition: width 0.4s;
        }

        #message { font-size: 1.6rem; font-weight: bold; height: 45px; color: #555; margin-bottom: 5px; }

        #sound-btn {
            background: #f1c40f;
            border: none;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            font-size: 60px;
            cursor: pointer;
            box-shadow: 0 8px 0 #f39c12;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.1s;
        }

        #sound-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #f39c12; }

        #options-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-picto {
            background: #fff;
            border: 4px solid #dcdde1;
            border-radius: 20px;
            font-size: 55px;
            padding: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #bdc3c7;
            min-width: 100px;
        }

        .btn-picto:hover { transform: scale(1.05); border-color: var(--primary); }

        /* Estilos del Cartel de Finalizado */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 32px;
        }

        #overlay h2 { font-size: 3rem; color: var(--primary); margin: 10px; }
        #overlay p { font-size: 1.5rem; color: #333; }
        #overlay button {
            padding: 15px 40px; font-size: 1.5rem;
            background: var(--correct); color: white;
            border: none; border-radius: 20px; cursor: pointer;
            box-shadow: 0 6px 0 #2d8a24;
            margin-top: 20px;
        }

        #credits {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            background: rgba(255,255,255,0.8);
            padding: 2px 10px;
            border-radius: 10px;
            pointer-events: none;
        }

        .shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="progress-wrapper"><div id="progress-bar"></div></div>
    <div id="message">¡Toca para escuchar!</div>
    
    <button id="sound-btn" onclick="reproducir()">🔊</button>

    <div id="options-container"></div>

    <div id="overlay">
        <h2 id="overlay-emoji">🏆</h2>
        <h2 id="overlay-title">¡INCREÍBLE!</h2>
        <p id="overlay-msg">Eres un experto en sonidos.</p>
        <button onclick="reiniciarJuego()">Jugar de nuevo</button>
    </div>

    <div id="credits">Creado por el Prof. Gastón</div>
</div>

<audio id="player"></audio>

<script>
    let etapa = 0;
    const etapasMeta = 10;
    let animalCorrecto = null;
    let animalesDisponibles = [];
    const player = document.getElementById('player');

    const listaAnimales = [
        { picto: '🐱', audio: 'gato.mp3' },
        { picto: '🐶', audio: 'perro.mp3' },
        { picto: '🐥', audio: 'pollito.mp3' },
        { picto: '🐄', audio: 'vaca.mp3' },
        { picto: '🐑', audio: 'oveja.mp3' },
        { picto: '🐖', audio: 'chancho.mp3' },
        { picto: '🐺', audio: 'lobo.mp3' },
        { picto: '🐔', audio: 'gallina.mp3' },
        { picto: '🐻', audio: 'oso.mp3' },
        { picto: '🦜', audio: 'loro.mp3' },
        { picto: '🦁', audio: 'leon.mp3' }
    ];

    function reproducir() {
        if (animalCorrecto) {
            player.src = animalCorrecto.audio;
            player.load(); 
            player.play().catch(e => console.log("Error de audio:", e));
            document.getElementById('message').innerText = "¿Quién es?";
        }
    }

    function nuevaRonda() {
        if (etapa >= etapasMeta) {
            document.getElementById('overlay').style.display = 'flex';
            return;
        }

        document.getElementById('progress-bar').style.width = (etapa * (100/etapasMeta)) + "%";
        
        if (animalesDisponibles.length === 0) {
            animalesDisponibles = [...listaAnimales];
        }
        const indiceAzar = Math.floor(Math.random() * animalesDisponibles.length);
        animalCorrecto = animalesDisponibles[indiceAzar];
        animalesDisponibles.splice(indiceAzar, 1); 

        let otros = listaAnimales.filter(a => a.picto !== animalCorrecto.picto);
        otros.sort(() => Math.random() - 0.5);
        let distractores = otros.slice(0, 4);

        let opcionesFinales = [animalCorrecto, ...distractores].sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        opcionesFinales.forEach(a => {
            const btn = document.createElement('button');
            btn.className = 'btn-picto';
            btn.innerText = a.picto;
            btn.onclick = () => validar(a);
            container.appendChild(btn);
        });

        document.getElementById('message').innerText = "¡Toca para escuchar!";
        document.getElementById('message').style.color = "#555";
    }

    function validar(elegido) {
        if (elegido.picto === animalCorrecto.picto) {
            document.getElementById('message').innerText = "¡SÍ! ✨";
            document.getElementById('message').style.color = "var(--correct)";
            etapa++;
            setTimeout(nuevaRonda, 1200);
        } else {
            document.getElementById('message').innerText = "¡Intenta de nuevo! 👂";
            document.getElementById('message').style.color = "var(--wrong)";
            document.getElementById('game-container').classList.add('shake');
            setTimeout(() => document.getElementById('game-container').classList.remove('shake'), 400);
            reproducir();
        }
    }

    function reiniciarJuego() {
        etapa = 0;
        animalesDisponibles = [];
        document.getElementById('overlay').style.display = 'none';
        nuevaRonda();
    }

    nuevaRonda();
</script>
</body>
</html>
