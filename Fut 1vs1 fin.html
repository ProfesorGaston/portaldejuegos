<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FC HTML - 8-Bit Pro Edition</title>
    <style>
        body { 
            background: #0a0a0a; color: white; font-family: 'Montserrat', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }

        #selection-screen {
            position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a1a, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .selector-container { display: flex; gap: 40px; margin-bottom: 30px; }
        .player-box { 
            background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; 
            border: 2px solid #444; text-align: center; width: 220px;
        }
        .color-preview { width: 70px; height: 70px; border-radius: 50%; margin: 15px auto; border: 4px solid white; }
        .nav-btn { background: #444; border: none; color: white; width: 40px; height: 40px; cursor: pointer; border-radius: 50%; font-size: 18px; }
        
        .mode-container { display: flex; gap: 20px; }
        .btn-start { padding: 18px 50px; font-size: 20px; font-weight: 900; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; background: #2ecc71; }
        .btn-start:hover { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 0 20px rgba(46, 204, 113, 0.4); }

        #ui-top { 
            display: none; gap: 12px; align-items: center; margin-bottom: 10px; 
            transform: scale(0.72);
        }
        #scoreboard { display: flex; align-items: center; background: rgba(0, 0, 0, 0.9); border: 3px solid #444; border-radius: 10px; padding: 8px 25px; }
        #timer-box { background: #111; padding: 8px 20px; border-radius: 10px; border: 2.5px solid #f1c40f; font-size: 28px; font-weight: 900; color: #f1c40f; text-align: center; min-width: 130px; }
        .score-display { font-size: 44px; font-weight: 900; margin: 0 20px; }

        #game-overlay {
            position: absolute; display: none; background: rgba(0,0,0,0.85); color: white;
            padding: 30px 60px; border-radius: 20px; border: 4px solid #f1c40f;
            text-align: center; z-index: 50; backdrop-filter: blur(10px);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        canvas { 
            display: none; background: #1e824c; border-radius: 8px; 
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            image-rendering: pixelated; 
        }
    </style>
</head>
<body>

    <div id="game-overlay">
        <h1 id="overlay-title" style="margin: 0; font-size: 40px; letter-spacing: 2px;">FIN DEL PARTIDO</h1>
        <p id="overlay-subtitle" style="color: #aaa; margin-top: 10px;">RECARGA PARA JUGAR OTRA VEZ</p>
    </div>

    <div id="selection-screen">
        <h1 style="letter-spacing: 4px; margin-bottom: 5px;">VESTUARIO</h1>
        <div class="selector-container">
            <div class="player-box">
                <h3 style="margin: 0">J1</h3>
                <div id="p1-preview" class="color-preview" style="background: #4364F7;"></div>
                <div id="p1-name" style="font-weight: 900; margin-bottom: 10px;">MESSI</div>
                <button class="nav-btn" onclick="changeColor(1, -1)">❮</button>
                <button class="nav-btn" onclick="changeColor(1, 1)">❯</button>
            </div>
            <div class="player-box">
                <h3 style="margin: 0">J2</h3>
                <div id="p2-preview" class="color-preview" style="background: #FF4B2B;"></div>
                <div id="p2-name" style="font-weight: 900; margin-bottom: 10px;">CR7</div>
                <button class="nav-btn" onclick="changeColor(2, -1)">❮</button>
                <button class="nav-btn" onclick="changeColor(2, 1)">❯</button>
            </div>
        </div>
        <div class="mode-container">
            <button class="btn-start" onclick="startGame()">¡JUGAR PARTIDO!</button>
        </div>
    </div>

    <div id="ui-top">
        <div id="scoreboard">
            <div id="p1-tag" class="score-display">0</div>
            <div id="match-type" style="font-size: 14px; color: #666; font-weight: 900; text-align: center;">VS</div>
            <div id="p2-tag" class="score-display">0</div>
        </div>
        <div id="timer-box">
            <span id="period" style="font-size: 12px; display: block; color: #888; margin-bottom: -5px;">AMISTOSO</span>
            <span id="time">02:00</span>
        </div>
    </div>

    <canvas id="field" width="800" height="480"></canvas>

<script>
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('game-overlay');
    
    const colors = [
        { name: 'MESSI', hex: '#4364F7', detail: '#000' }, 
        { name: 'CR7', hex: '#FF4B2B', detail: '#fff' },
        { name: 'LAMINE YAMAL', hex: '#f1c40f', detail: '#000' },
        { name: 'MBAPPE', hex: '#ffffff', detail: '#000' },
        { name: 'CENTURION', hex: '#87CEEB', detail: '#000' },
        { name: 'EL MOMO', hex: '#8B4513', detail: '#fff' },
        { name: 'PATRICIO', hex: '#FF69B4', detail: '#fff' }
    ];
    
    const P_SIZE = 3.5; 
    let frameCounter = 0;
    let p1ColIdx = 0, p2ColIdx = 1;
    let p1Score = 0, p2Score = 0, gameRunning = false, timeLeft = 120; 
    let keys = {};

    const friction = 0.985, playerFriction = 0.85, acceleration = 1.4;
    const ball = { x: 400, y: 240, vx: 0, vy: 0, r: 10, angle: 0 };
    
    const p1 = { x: 160, y: 240, vx: 0, vy: 0, r: 20, color: '', detail: '', side: 1, name: 'MESSI' };
    const p2 = { x: 640, y: 240, vx: 0, vy: 0, r: 20, color: '', detail: '', side: -1, name: 'CR7' };

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    function isShooting(p) {
        if (p === p1) return keys['Space'];
        return keys['KeyL'] || keys['Digit0'] || keys['Numpad0'];
    }

    function changeColor(player, direction) {
        if(player === 1) {
            p1ColIdx = (p1ColIdx + direction + colors.length) % colors.length;
            p1.name = colors[p1ColIdx].name;
            document.getElementById('p1-preview').style.background = colors[p1ColIdx].hex;
            document.getElementById('p1-name').innerText = colors[p1ColIdx].name;
            document.getElementById('p1-name').style.color = colors[p1ColIdx].hex;
        } else {
            p2ColIdx = (p2ColIdx + direction + colors.length) % colors.length;
            p2.name = colors[p2ColIdx].name;
            document.getElementById('p2-preview').style.background = colors[p2ColIdx].hex;
            document.getElementById('p2-name').innerText = colors[p2ColIdx].name;
            document.getElementById('p2-name').style.color = colors[p2ColIdx].hex;
        }
    }

    function startGame() {
        p1.color = colors[p1ColIdx].hex; p1.detail = colors[p1ColIdx].detail;
        p2.color = colors[p2ColIdx].hex; p2.detail = colors[p2ColIdx].detail;
        
        document.getElementById('p1-tag').style.color = p1.color;
        document.getElementById('p2-tag').style.color = p2.color;
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('ui-top').style.display = 'flex';
        canvas.style.display = 'block';
        gameRunning = true; 
        startTimer();
    }

    function startTimer() {
        let interval = setInterval(() => {
            if (!gameRunning) return;
            timeLeft--;
            if (timeLeft <= 0) {
                gameRunning = false;
                clearInterval(interval);
                showOverlay("FIN DEL PARTIDO", `${p1Score} - ${p2Score}`);
                setTimeout(() => location.reload(), 5000);
            }
            const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
            document.getElementById('time').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
    }

    function showOverlay(title, subtitle) {
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-subtitle').innerText = subtitle;
        overlay.style.display = 'block';
    }

    function draw8BitPlayer(p) {
        ctx.save();
        ctx.translate(p.x, p.y);
        if (p.vx < -0.2) p.side = -1;
        if (p.vx > 0.2) p.side = 1;
        ctx.scale(p.side, 1);
        
        const isMoving = Math.abs(p.vx) + Math.abs(p.vy) > 0.5;
        const shooting = isShooting(p);

        ctx.fillStyle = "rgba(0,0,0,0.2)";
        ctx.fillRect(-P_SIZE*3, P_SIZE*7, P_SIZE*6, P_SIZE*2);

        ctx.fillStyle = "#fff"; 
        let legOff = isMoving ? Math.sin(frameCounter * 0.3) * P_SIZE * 1.5 : 0;
        
        if (shooting) {
            ctx.fillRect(P_SIZE*0.5, P_SIZE*3, P_SIZE*3.5, P_SIZE*2.5); 
            ctx.fillRect(-P_SIZE*1.5, P_SIZE*4, P_SIZE*1.5, P_SIZE*3);
        } else {
            ctx.fillRect(-P_SIZE*2, P_SIZE*4 + legOff, P_SIZE*1.5, P_SIZE*3);
            ctx.fillRect(P_SIZE*0.5, P_SIZE*4 - legOff, P_SIZE*1.5, P_SIZE*3);
        }

        ctx.fillStyle = p.color;
        ctx.fillRect(-P_SIZE*3, -P_SIZE*3, P_SIZE*6, P_SIZE*7);
        ctx.fillStyle = p.detail;
        ctx.fillRect(-P_SIZE*3, -P_SIZE*3, P_SIZE*6, P_SIZE*1); 
        ctx.fillRect(-P_SIZE*0.5, -P_SIZE*3, P_SIZE*1, P_SIZE*2.5);

        ctx.fillStyle = "#ffdbac";
        let armMov = isMoving ? -legOff : 0;
        ctx.fillRect(-P_SIZE*4, -P_SIZE*1 + armMov, P_SIZE*1, P_SIZE*4);
        ctx.fillRect(P_SIZE*3, -P_SIZE*1 - armMov, P_SIZE*1, P_SIZE*4);

        ctx.fillStyle = "#ffdbac";
        ctx.fillRect(-P_SIZE*2, -P_SIZE*7, P_SIZE*4, P_SIZE*4);
        ctx.fillStyle = "#4b2c20";
        ctx.fillRect(-P_SIZE*2, -P_SIZE*7.5, P_SIZE*4.5, P_SIZE*1.5);
        ctx.fillStyle = "#000";
        ctx.fillRect(P_SIZE*0.5, -P_SIZE*5, P_SIZE*0.5, P_SIZE*1);

        ctx.restore();
        ctx.fillStyle = "white"; ctx.font = "bold 12px Montserrat"; ctx.textAlign = "center";
        ctx.fillText(p.name, p.x, p.y - 40);
    }

    function drawNet(x, y, height, isLeft) {
        let depth = isLeft ? -44 : 44;
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + depth, y + 12); ctx.lineTo(x + depth, y + height - 12); ctx.lineTo(x, y + height); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i = 0; i <= height; i += 6) { ctx.moveTo(x, y + i); ctx.lineTo(x + depth, y + i + (i < height/2 ? 4 : -4)); }
        for(let j = 0; j <= Math.abs(depth); j += 6) { 
            let off = isLeft ? -j : j; ctx.moveTo(x + off, y + (j*0.3)); ctx.lineTo(x + off, y + height - (j*0.3)); 
        }
        ctx.stroke();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + height); ctx.stroke();
    }

    function update() {
        if (!gameRunning) { draw(); return requestAnimationFrame(update); }
        frameCounter++;

        if (keys['KeyW']) p1.vy -= acceleration; if (keys['KeyS']) p1.vy += acceleration;
        if (keys['KeyA']) p1.vx -= acceleration; if (keys['KeyD']) p1.vx += acceleration;
        if (keys['ArrowUp']) p2.vy -= acceleration; if (keys['ArrowDown']) p2.vy += acceleration;
        if (keys['ArrowLeft']) p2.vx -= acceleration; if (keys['ArrowRight']) p2.vx += acceleration;

        [p1, p2].forEach(p => {
            p.vx *= playerFriction; p.vy *= playerFriction; p.x += p.vx; p.y += p.vy;
            if (p.x < p.r) p.x = p.r; if (p.x > canvas.width - p.r) p.x = canvas.width - p.r;
            if (p.y < p.r) p.y = p.r; if (p.y > canvas.height - p.r) p.y = canvas.height - p.r;
        });

        let dxp = p2.x - p1.x, dyp = p2.y - p1.y, distP = Math.sqrt(dxp**2 + dyp**2);
        if (distP < p1.r + p2.r) {
            let angle = Math.atan2(dyp, dxp);
            p1.vx -= Math.cos(angle) * 7; p1.vy -= Math.sin(angle) * 7;
            p2.vx += Math.cos(angle) * 7; p2.vy += Math.sin(angle) * 7;
        }

        [p1, p2].forEach(p => {
            let dx = ball.x - p.x, dy = ball.y - p.y, dist = Math.sqrt(dx**2 + dy**2);
            if (dist < p.r + ball.r) {
                let nx = dx / dist, ny = dy / dist;
                ball.x = p.x + nx * (p.r + ball.r);
                let force = Math.sqrt(p.vx**2 + p.vy**2) * 0.8 + 2.5; 
                if (isShooting(p)) force = 26;
                ball.vx += nx * force; ball.vy += ny * force;
            }
        });

        ball.x += ball.vx; ball.y += ball.vy;
        ball.vx *= friction; ball.vy *= friction;
        ball.angle += Math.sqrt(ball.vx**2 + ball.vy**2) * 0.08;

        if (ball.y < ball.r || ball.y > canvas.height - ball.r) ball.vy *= -1.2;
        
        if (ball.x > canvas.width - 32 - ball.r) {
            if (ball.y > 176 && ball.y < 304 && ball.x > canvas.width - ball.r) {
                p1Score++; document.getElementById('p1-tag').innerText = p1Score; reset();
            } else if (ball.y <= 176 || ball.y >= 304) { ball.x = canvas.width - 32 - ball.r; ball.vx *= -1.2; }
        }
        if (ball.x < 32 + ball.r) {
            if (ball.y > 176 && ball.y < 304 && ball.x < ball.r) {
                p2Score++; document.getElementById('p2-tag').innerText = p2Score; reset();
            } else if (ball.y <= 176 || ball.y >= 304) { ball.x = 32 + ball.r; ball.vx *= -1.2; }
        }

        draw(); requestAnimationFrame(update);
    }

    function reset() {
        ball.x = 400; ball.y = 240; ball.vx = 0; ball.vy = 0;
        p1.x = 160; p1.y = 240; p1.vx = 0; p1.vy = 0;
        p2.x = 640; p2.y = 240; p2.vx = 0; p2.vy = 0;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let i = 0; i < canvas.width; i += 40) {
            ctx.fillStyle = (i / 40) % 2 === 0 ? '#1b7a43' : '#1e864a';
            ctx.fillRect(i, 0, 40, canvas.height);
        }
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.moveTo(400, 0); ctx.lineTo(400, 480); ctx.stroke();
        ctx.beginPath(); ctx.arc(400, 240, 64, 0, Math.PI*2); ctx.stroke();
        ctx.strokeRect(32, 120, 96, 240); ctx.strokeRect(672, 120, 96, 240);
        drawNet(32, 176, 128, true); drawNet(768, 176, 128, false);
        draw8BitPlayer(p1);
        draw8BitPlayer(p2);
        ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.angle);
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();
        ["#0052D4", "#FF4B2B", "#2ecc71", "#222"].forEach((c, i) => { 
            ctx.strokeStyle = c; ctx.beginPath(); ctx.arc(0, 0, ball.r-2, i*Math.PI/2, (i+0.7)*Math.PI/2); ctx.stroke(); 
        });
        ctx.restore();
    }
    update();
</script>
</body>
</html>
