<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PENALTY CUP LPF EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: rgba(255, 255, 255, 0.03);
            --skin: #ffdbac;
        }

        body {
            background: var(--bg); color: white; font-family: 'Inter', sans-serif;
            margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden;
        }

        /* --- VESTUARIO LPF --- */
        #menu { width: 100%; max-width: 1000px; text-align: center; animation: fadeIn 0.8s ease; }
        h1 { font-size: 50px; font-weight: 900; letter-spacing: -2px; margin-bottom: 30px; }
        
        .locker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { font-size: 11px; opacity: 0.5; letter-spacing: 2px; margin-bottom: 15px; }
        
        /* Selector de equipos LPF */
        .teams { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .team-opt { 
            height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid transparent;
            display: flex; overflow: hidden; transition: 0.3s; position: relative;
        }
        .team-opt:hover { transform: translateY(-3px); }
        .team-opt.active { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .t-c { width: 50%; height: 100%; }

        .btn-play {
            background: white; color: black; border: none; padding: 18px 50px;
            font-size: 14px; font-weight: 800; border-radius: 100px; cursor: pointer;
        }

        /* --- ESTADIO --- */
        #game { display: none; flex-direction: column; align-items: center; }
        #stadium {
            position: relative; width: 900px; height: 480px;
            background: linear-gradient(180deg, #000 0%, #0d2114 100%);
            border-radius: 40px; border: 1px solid #222; overflow: hidden;
        }

        #goal {
            position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
            width: 460px; height: 210px; border: 6px solid white; border-bottom: none; z-index: 1;
        }

        /* ARQUERO REALISTA */
        #keeper {
            position: absolute; bottom: 190px; left: 50%; transform: translateX(-50%);
            width: 70px; height: 120px; z-index: 10; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .k-head { width: 22px; height: 24px; background: var(--skin); border-radius: 10px 10px 50% 50%; margin: 0 auto; position: relative; z-index: 5; }
        .k-torso { width: 42px; height: 50px; border-radius: 10px 10px 4px 4px; margin: 0 auto; position: relative; z-index: 4; }
        .k-arm { position: absolute; width: 11px; height: 45px; background: var(--skin); border-radius: 6px; top: 2px; transition: 0.3s; }
        .k-arm.l { left: -10px; transform-origin: top center; }
        .k-arm.r { right: -10px; transform-origin: top center; }
        /* Piernas articuladas */
        .k-pelvis { width: 38px; height: 15px; background: #222; margin: -2px auto; border-radius: 0 0 5px 5px; }
        .k-legs { display: flex; justify-content: center; gap: 6px; margin-top: -5px; }
        .k-leg { width: 14px; height: 40px; background: var(--skin); border-radius: 0 0 6px 6px; position: relative; }
        .k-sock { position: absolute; bottom: 0; width: 100%; height: 25px; border-radius: 0 0 6px 6px; }

        #ball {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 32px; height: 32px; background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border-radius: 50%; z-index: 20; transition: 0.5s;
        }

        .controls { margin-top: 30px; display: grid; grid-template-columns: repeat(3, 140px); gap: 10px; }
        .btn-act {
            padding: 15px; background: var(--card); border: 1px solid #333;
            color: white; border-radius: 12px; cursor: pointer; font-size: 10px; font-weight: 700;
        }

        /* ANIMACIONES PRO */
        .dive-l { transform: translate(-190px, -50px) rotate(-85deg) !important; }
        .dive-l .k-arm.l { transform: rotate(-100deg) translateY(-5px); }
        .dive-r { transform: translate(160px, -50px) rotate(85deg) !important; }
        .dive-r .k-arm.r { transform: rotate(100deg) translateY(-5px); }
        .jump { transform: translate(-50%, -90px) scaleY(1.1) !important; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="menu">
        <h1>LPF PENALTY CUP</h1>
        <div class="locker-grid">
            <div class="card">
                <h2>PLAYER 1</h2>
                <div class="teams" id="t1">
                    <div class="team-opt active" onclick="setTeam(1,['#004a99','#f1c40f'],'BOC',this)"><div class="t-c" style="background:#004a99"></div><div class="t-c" style="background:#f1c40f"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#fff','#ff0000'],'RIV',this)"><div class="t-c" style="background:#fff"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#ff0000','#000'],'IND',this)"><div class="t-c" style="background:#ff0000"></div><div class="t-c" style="background:#000"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#00d2ff','#fff'],'RAC',this)"><div class="t-c" style="background:#00d2ff"></div><div class="t-c" style="background:#fff"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#000','#ff0000'],'NEW',this)"><div class="t-c" style="background:#000"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#000','#f1c40f'],'CEN',this)"><div class="t-c" style="background:#000"></div><div class="t-c" style="background:#f1c40f"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#004a99','#ff0000'],'SLO',this)"><div class="t-c" style="background:#004a99"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(1,['#fff','#000'],'VEL',this)"><div class="t-c" style="background:#fff"></div><div class="t-c" style="background:#000"></div></div>
                </div>
            </div>
            <div class="card">
                <h2>RIVAL</h2>
                <div class="teams" id="t2">
                    <div class="team-opt" onclick="setTeam(2,['#004a99','#f1c40f'],'BOC',this)"><div class="t-c" style="background:#004a99"></div><div class="t-c" style="background:#f1c40f"></div></div>
                    <div class="team-opt active" onclick="setTeam(2,['#fff','#ff0000'],'RIV',this)"><div class="t-c" style="background:#fff"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#ff0000','#000'],'IND',this)"><div class="t-c" style="background:#ff0000"></div><div class="t-c" style="background:#000"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#00d2ff','#fff'],'RAC',this)"><div class="t-c" style="background:#00d2ff"></div><div class="t-c" style="background:#fff"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#000','#ff0000'],'NEW',this)"><div class="t-c" style="background:#000"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#000','#f1c40f'],'CEN',this)"><div class="t-c" style="background:#000"></div><div class="t-c" style="background:#f1c40f"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#004a99','#ff0000'],'SLO',this)"><div class="t-c" style="background:#004a99"></div><div class="t-c" style="background:#ff0000"></div></div>
                    <div class="team-opt" onclick="setTeam(2,['#fff','#000'],'VEL',this)"><div class="t-c" style="background:#fff"></div><div class="t-c" style="background:#000"></div></div>
                </div>
            </div>
        </div>
        <button class="btn-play" onclick="start('ia')">JUGAR CONTRA IA</button>
    </div>

    <div id="game">
        <div id="stadium">
            <div id="goal"></div>
            <div id="keeper">
                <div class="k-head"></div>
                <div class="k-arm l"></div>
                <div class="k-torso"></div>
                <div class="k-arm r"></div>
                <div class="k-pelvis"></div>
                <div class="k-legs">
                    <div class="k-leg"><div class="k-sock"></div></div>
                    <div class="k-leg"><div class="k-sock"></div></div>
                </div>
            </div>
            <div id="ball"></div>
        </div>
        <div id="msg" style="margin-top:20px; font-weight:900; font-size:16px;">TU TURNO DE PATEAR</div>
        <div class="controls" id="ui-p">
            <button class="btn-act" onclick="shot('tl')">ANG IZQ</button>
            <button class="btn-act" onclick="shot('tc')">ARRIBA</button>
            <button class="btn-act" onclick="shot('tr')">ANG DER</button>
            <button class="btn-act" onclick="shot('bl')">ABAJO IZQ</button>
            <button class="btn-act" onclick="shot('bc')">MEDIO</button>
            <button class="btn-act" onclick="shot('br')">ABAJO DER</button>
        </div>
    </div>

    <script>
        let p1c = ["#004a99","#f1c40f"], p2c = ["#fff","#ff0000"], mode = "ia";
        let s1 = 0, s2 = 0;

        function setTeam(p, c, name, el) {
            Array.from(el.parentElement.children).forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            if(p===1) p1c = c; else p2c = c;
        }

        function start(m) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'flex';
            renderKeeper(p2c);
        }

        function renderKeeper(c) {
            const t = document.querySelector('.k-torso');
            const arms = document.querySelectorAll('.k-arm');
            const socks = document.querySelectorAll('.k-sock');
            
            t.style.backgroundColor = c[0];
            // Diseño de camiseta según colores
            t.style.backgroundImage = `linear-gradient(180deg, transparent 40%, ${c[1]} 40%, ${c[1]} 60%, transparent 60%)`;
            arms.forEach(a => a.style.backgroundColor = c[0]);
            socks.forEach(s => s.style.backgroundColor = c[0]);
        }

        function shot(dir) {
            document.getElementById('ui-p').style.display = 'none';
            const k = document.getElementById('keeper');
            const b = document.getElementById('ball');
            const ai = ['tl','tc','tr','bl','bc','br'][Math.floor(Math.random()*6)];

            // Animación Arquero
            if(ai.includes('l')) k.className = 'dive-l';
            else if(ai.includes('r')) k.className = 'dive-r';
            else if(ai === 'tc') k.className = 'jump';
            else k.style.transform = 'translateX(-50%) translateY(35px)';

            // Pelota
            const pos = { 'tl':[-210,-280], 'tc':[0,-300], 'tr':[210,-280], 'bl':[-190,-120], 'bc':[0,-110], 'br':[190,-120] };
            b.style.transform = `translate(${pos[dir][0]}px, ${pos[dir][1]}px) scale(0.6)`;

            setTimeout(() => {
                if(dir === ai) {
                    document.getElementById('msg').innerText = "¡LA ATAJÓ!";
                    b.style.transform += " translate(30px, 90px)";
                } else {
                    document.getElementById('msg').innerText = "¡GOOOOOL!";
                    s1++;
                }
                setTimeout(reset, 2000);
            }, 600);
        }

        function reset() {
            document.getElementById('ball').style.transform = "translateX(-50%)";
            document.getElementById('keeper').className = "";
            document.getElementById('keeper').style.transform = "translateX(-50%)";
            document.getElementById('ui-p').style.display = 'grid';
            document.getElementById('msg').innerText = `P1: ${s1} - IA: ${s2} | TU TURNO`;
        }
    </script>
</body>
</html>
