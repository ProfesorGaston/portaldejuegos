<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sombras Misteriosas - Prof. Gastón</title>
    <style>
        /* Importamos la fuente del juego y la FUENTE DE EMOJIS a color de Google */
        @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;800&family=Noto+Color+Emoji&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
        }

        body {
            margin: 0; padding: 0; 
            background: linear-gradient(180deg, #74b9ff 0%, #a29bfe 100%);
            font-family: 'Baloo 2', sans-serif; display: flex;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- FIX DEFINITIVO PARA WINDOWS 11 --- */
        /* Forzamos a que todo lo que sea emoji use fuente normal y no herede negritas */
        .emoji, .shadow-target, .animal-draggable, .cheer-icon, .score-board span {
            font-family: 'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif !important;
            font-weight: 400 !important; 
            font-style: normal !important;
            color: initial !important; 
        }

        /* --- FONDO ANIMADO (PAISAJE PREMIUM) --- */
        #landscape { position: absolute; width: 100%; height: 100%; z-index: 0; overflow: hidden; pointer-events: none; }
        .sun {
            position: absolute; top: 8%; left: 8%; width: 130px; height: 130px;
            background: #ffeaa7; border-radius: 50%; 
            box-shadow: 0 0 50px #fdcb6e, 0 0 100px #ffeaa7;
            animation: pulseSun 4s infinite alternate ease-in-out;
        }
        @keyframes pulseSun { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        
        .cloud {
            position: absolute; background: rgba(255,255,255,0.9); border-radius: 50px;
            animation: floatCloud linear infinite; filter: drop-shadow(0 8px 10px rgba(0,0,0,0.05));
        }
        .cloud::before, .cloud::after { content: ""; position: absolute; background: rgba(255,255,255,0.9); border-radius: 50%; }
        .c1 { width: 160px; height: 60px; top: 12%; left: -200px; animation-duration: 30s; }
        .c1::before { width: 80px; height: 80px; top: -40px; left: 20px; }
        .c1::after { width: 60px; height: 60px; top: -25px; left: 85px; }

        .c2 { width: 220px; height: 70px; top: 25%; left: -300px; animation-duration: 40s; animation-delay: 8s; transform: scale(0.8); }
        .c2::before { width: 90px; height: 90px; top: -45px; left: 35px; }
        .c2::after { width: 80px; height: 80px; top: -35px; left: 110px; }

        @keyframes floatCloud { from { transform: translateX(0); } to { transform: translateX(120vw); } }

        .hill { position: absolute; bottom: 0; border-radius: 50% 50% 0 0; }
        .hill-back { width: 130%; height: 48%; background: #55efc4; left: -15%; z-index: 1; box-shadow: inset 0 20px 0 rgba(255,255,255,0.2); }
        .hill-front { width: 120%; height: 38%; background: #00b894; right: -10%; z-index: 2; box-shadow: inset 0 20px 0 rgba(255,255,255,0.15); }

        /* --- CONTENEDOR DEL JUEGO --- */
        #game-area {
            position: relative; width: 100%; 
            max-width: 990px; /* Ensanchado un 10% (antes 900px) */
            height: 100%; max-height: 650px;
            z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 25px;
        }

        /* --- UI Y MARCADOR --- */
        .header { width: 100%; display: flex; justify-content: flex-end; align-items: center; }
        
        .score-board {
            background: linear-gradient(135deg, #ffffff, #f1f2f6); 
            padding: 8px 30px; border-radius: 40px;
            font-size: 32px; color: #ff6b81; 
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), 0 8px 0 #dfe4ea;
            display: flex; align-items: center; gap: 12px; font-weight: 800;
        }
        .score-board span { font-size: 40px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1)); }

        /* --- LA MARCA DE AGUA BONITA --- */
        .watermark-badge {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 800;
            color: #2f3542;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid #fff;
            z-index: 100;
        }

        /* --- TABLERO DE MADERA --- */
        .board-container { flex-grow: 1; display: flex; justify-content: center; align-items: center; width: 100%; margin: 20px 0; }
        .wooden-board {
            background: #d35400; border-radius: 40px; border: 12px solid #e67e22;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 20px 40px rgba(0,0,0,0.3);
            width: 350px; height: 350px; display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .wooden-board::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 10px, rgba(0,0,0,0.05) 10px, rgba(0,0,0,0.05) 20px); pointer-events: none;
        }
        .wooden-board::before {
            content: ""; position: absolute; width: 90%; height: 90%; border: 4px dashed rgba(255,255,255,0.2); border-radius: 30px; pointer-events: none;
        }

        .shadow-target {
            font-size: 160px; line-height: 1; filter: brightness(0) drop-shadow(0 20px 10px rgba(0,0,0,0.4));
            transition: all 0.5s ease;
        }
        .shadow-target.revealed { filter: brightness(1) drop-shadow(0 20px 15px rgba(0,0,0,0.3)); transform: scale(1.1); }

        /* --- OPCIONES DE ANIMALES --- */
        .options-container {
            display: flex; justify-content: center; gap: 30px; width: 100%;
            padding: 20px; background: rgba(255,255,255,0.3); border-radius: 40px; backdrop-filter: blur(10px);
            border: 4px solid rgba(255,255,255,0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .animal-draggable {
            font-size: 80px; width: 110px; height: 110px; background: #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 15px 25px rgba(0,0,0,0.15), inset 0 -5px 10px rgba(0,0,0,0.05);
            border: 5px solid #fff; cursor: grab; transition: transform 0.1s; z-index: 10;
        }
        .animal-draggable:active { cursor: grabbing; transform: scale(1.15); filter: drop-shadow(0 20px 15px rgba(0,0,0,0.3)); }
        
        .animal-draggable.anim-float { animation: floatAnim 3s ease-in-out infinite; }
        .animal-draggable.anim-float:nth-child(2) { animation-delay: 1s; }
        .animal-draggable.anim-float:nth-child(3) { animation-delay: 2s; }
        
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(5deg); }
        }

        /* --- MENSAJES Y SCREENS --- */
        .msg-muy-bien {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 80px; color: #ffeb3b; font-weight: 900;
            text-shadow: 0 10px 0 #f39c12, 0 15px 30px rgba(0,0,0,0.5); z-index: 100;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); opacity: 0; pointer-events: none; line-height: 1; text-align: center;
        }
        .msg-muy-bien.show { transform: translate(-50%, -50%) scale(1) rotate(-5deg); opacity: 1; }

        #cheer-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s; backdrop-filter: blur(10px);
        }
        #cheer-screen.show { opacity: 1; pointer-events: all; }
        .cheer-icon { font-size: 150px; filter: drop-shadow(0 0 50px rgba(255, 234, 167, 0.8)); animation: pulseStar 1s infinite alternate; }
        @keyframes pulseStar { 0% { transform: scale(0.9); } 100% { transform: scale(1.2); } }
        .cheer-text { font-size: 60px; color: #fff; text-shadow: 0 5px 0 #000; text-align: center; line-height: 1; margin-top: 20px; }
        .btn-continue {
            margin-top: 40px; padding: 15px 50px; font-size: 30px; font-family: 'Baloo 2', cursive; font-weight: 800;
            background: linear-gradient(to bottom, #00b894, #00cec9); color: white; border: none; border-radius: 50px;
            box-shadow: 0 8px 0 #019074, 0 15px 20px rgba(0,0,0,0.3); cursor: pointer; border: 4px solid #fff; transition: all 0.1s;
        }
        .btn-continue:active { transform: translateY(8px); box-shadow: 0 0 0 #019074, 0 5px 10px rgba(0,0,0,0.3); }

        .confetti { position: absolute; width: 15px; height: 30px; border-radius: 4px; animation: fall linear forwards; z-index: 50; }
        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="landscape">
        <div class="sun"></div>
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="hill hill-back"></div>
        <div class="hill hill-front"></div>
    </div>

    <div class="watermark-badge">Creado por el Prof. Gastón</div>

    <div id="game-area">
        <div class="header">
            <div class="score-board"><span>⭐</span> <div id="score">0</div></div>
        </div>

        <div class="board-container">
            <div class="wooden-board" id="board">
                <div class="shadow-target" id="shadow-target"></div>
            </div>
        </div>

        <div class="options-container" id="options-container">
            <div class="animal-draggable anim-float" id="opt-0"></div>
            <div class="animal-draggable anim-float" id="opt-1"></div>
            <div class="animal-draggable anim-float" id="opt-2"></div>
        </div>
        
        <div class="msg-muy-bien" id="msg-muy-bien">¡EXCELENTE!</div>
    </div>

    <div id="cheer-screen">
        <div class="cheer-icon" id="cheer-icon">🌟</div>
        <div class="cheer-text" id="cheer-text">¡ERES<br>GENIAL!</div>
        <button class="btn-continue" onclick="continueGame()">SEGUIR JUGANDO</button>
    </div>

<script>
    const emojis = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦉','🐢','🐙','🦑','🦐','🐡','🐠','🐟','🐬','🐳','🐋','🦈'];
    
    let currentTargetEmoji = '';
    let currentOptions = [];
    let score = 0;
    let levelsCompleted = 0;
    let isDragging = false;
    let draggedElement = null;
    let startX = 0, startY = 0, initialLeft = 0, initialTop = 0;

    let audioCtx;
    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (type === 'bounce') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        } else if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(600, now + 0.15); osc.frequency.setValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now); osc.stop(now + 0.6);
        } else if (type === 'cheer') {
            osc.type = 'square'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.2); osc.frequency.setValueAtTime(783.99, now + 0.4); osc.frequency.setValueAtTime(1046.50, now + 0.6);
            gain.gain.setValueAtTime(0.3, now); gain.gain.linearRampToValueAtTime(0, now + 1.2);
            osc.start(now); osc.stop(now + 1.2);
        }
    }

    window.addEventListener('click', initAudio, { once: true });
    window.addEventListener('touchstart', initAudio, { once: true });

    function loadLevel() {
        document.getElementById('msg-muy-bien').classList.remove('show');
        document.getElementById('shadow-target').classList.remove('revealed');
        document.getElementById('cheer-screen').classList.remove('show');

        let shuffled = [...emojis].sort(() => 0.5 - Math.random());
        currentOptions = shuffled.slice(0, 3);
        currentTargetEmoji = currentOptions[Math.floor(Math.random() * 3)];
        
        const targetEl = document.getElementById('shadow-target');
        targetEl.innerText = currentTargetEmoji;
        
        currentOptions.forEach((emj, index) => {
            const el = document.getElementById(`opt-${index}`);
            el.innerText = emj;
            el.style.display = 'flex';
            resetElementPosition(el);
            el.classList.add('anim-float');
        });
    }

    const draggables = document.querySelectorAll('.animal-draggable');
    draggables.forEach(el => {
        el.addEventListener('mousedown', dragStart);
        el.addEventListener('touchstart', dragStart, {passive: false});
    });

    window.addEventListener('mousemove', dragMove);
    window.addEventListener('touchmove', dragMove, {passive: false});

    window.addEventListener('mouseup', dragEnd);
    window.addEventListener('touchend', dragEnd);

    function dragStart(e) {
        if(e.type === 'touchstart') e.preventDefault();
        initAudio();
        isDragging = true;
        draggedElement = this;
        draggedElement.style.transition = 'none';
        draggedElement.style.zIndex = '100';
        draggedElement.classList.remove('anim-float');

        const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

        const rect = draggedElement.getBoundingClientRect();
        startX = clientX - rect.left;
        startY = clientY - rect.top;
    }

    function dragMove(e) {
        if (!isDragging || !draggedElement) return;
        e.preventDefault();

        const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
        const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

        draggedElement.style.position = 'fixed';
        draggedElement.style.left = (clientX - startX) + 'px';
        draggedElement.style.top = (clientY - startY) + 'px';
    }

    function dragEnd(e) {
        if (!isDragging || !draggedElement) return;
        isDragging = false;
        
        checkCollision(draggedElement);
        draggedElement = null;
    }

    function checkCollision(element) {
        const board = document.getElementById('board');
        const boardRect = board.getBoundingClientRect();
        const elRect = element.getBoundingClientRect();

        const boardCenterX = boardRect.left + boardRect.width / 2;
        const boardCenterY = boardRect.top + boardRect.height / 2;
        
        const elCenterX = elRect.left + elRect.width / 2;
        const elCenterY = elRect.top + elRect.height / 2;

        const distance = Math.hypot(elCenterX - boardCenterX, elCenterY - boardCenterY);

        if (distance < 150) {
            if (element.innerText === currentTargetEmoji) {
                score += 10;
                levelsCompleted++; 
                document.getElementById('score').innerText = score;

                element.style.display = 'none';
                document.getElementById('shadow-target').classList.add('revealed');
                
                document.querySelectorAll('.animal-draggable').forEach(el => el.classList.remove('anim-float'));

                if (levelsCompleted % 3 === 0) {
                    setTimeout(triggerCheerScreen, 800); 
                } else {
                    playSound('win');
                    spawnConfetti(20);
                    document.getElementById('msg-muy-bien').classList.add('show');
                    setTimeout(loadLevel, 2500);
                }
                return;
            }
        }
        
        playSound('bounce');
        resetElementPosition(element);
    }

    function resetElementPosition(element) {
        element.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        
        element.style.position = 'relative';
        element.style.left = 'auto';
        element.style.top = 'auto';
        element.style.zIndex = '10';

        setTimeout(() => {
            element.style.transition = 'transform 0.1s';
            element.classList.add('anim-float');
        }, 400);
    }

    function triggerCheerScreen() {
        playSound('cheer');
        spawnConfetti(80);
        const cheerPhrases = ["¡ERES<br>GENIAL!", "¡SÚPER<br>INTELIGENTE!", "¡QUÉ<br>RÁPIDO!", "¡UNA<br>ESTRELLA!"];
        document.getElementById('cheer-text').innerHTML = cheerPhrases[Math.floor(Math.random() * cheerPhrases.length)];
        document.getElementById('cheer-screen').classList.add('show');
    }

    function continueGame() {
        document.getElementById('cheer-screen').classList.remove('show');
        loadLevel();
    }

    function spawnConfetti(amount) {
        const colors = ['#fbc531', '#e1b12c', '#4cd137', '#00a8ff', '#9c88ff', '#e84118', '#ff4d4d'];
        for (let i = 0; i < amount; i++) {
            let conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + 'vw';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 2) + 's';
            conf.style.animationDelay = (Math.random() * 1) + 's';
            document.body.appendChild(conf);
            setTimeout(() => conf.remove(), 4000);
        }
    }

    loadLevel();
</script>
</body>
</html>
