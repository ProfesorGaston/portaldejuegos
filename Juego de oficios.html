<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafío de Oficios - Prof. Gastón</title>
    <style>
        :root {
            --bg: #d6eaf8;
            --panel: #ffffff;
            --primary: #2980b9;
            --correct: #27ae60;
            --wrong: #e74c3c;
            --line: #3498db;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            background: var(--panel);
            width: 95%;
            max-width: 850px;
            height: 92vh;
            padding: 20px;
            border-radius: 40px;
            border: 8px solid var(--primary);
            box-shadow: 0 10px 0 #1b4f72;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #header { margin-bottom: 10px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.6rem; }
        #level-indicator { 
            font-weight: bold; 
            color: #f39c12; 
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        #match-area {
            flex-grow: 1;
            display: flex;
            justify-content: space-between;
            position: relative;
            padding: 10px 60px;
        }

        .column {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            z-index: 2;
        }

        .item {
            background: white;
            border: 4px solid #dcdde1;
            border-radius: 25px;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #bdc3c7;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        /* Tamaño 20% más grande para niveles 1 y 2 */
        .large-emoji { font-size: 70px !important; width: 115px; height: 115px; }
        .normal-emoji { font-size: 50px; }

        .item.selected { border-color: var(--line); transform: scale(1.1); background: #ebf5fb; }
        .item.matched { border-color: var(--correct); background: #e9f7ef; opacity: 0.7; cursor: default; }

        canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Carteles Flotantes (Sustituyen al alert) */
        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 100;
            border-radius: 32px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        #overlay h2 { font-size: 3rem; margin: 0; }
        #overlay p { font-size: 1.5rem; color: #555; }
        #overlay button {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 0 #1b4f72;
            margin-top: 20px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #credits {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 0.85rem;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="level-indicator">Nivel 1</div>
        <h1>👨‍🔧 Conectando Oficios</h1>
    </div>
    
    <div id="match-area">
        <canvas id="lineCanvas"></canvas>
        <div class="column" id="left-col"></div>
        <div class="column" id="right-col"></div>
    </div>

    <div id="overlay">
        <h2 id="overlay-emoji">😢</h2>
        <h2 id="overlay-title">¡Oh no!</h2>
        <p id="overlay-msg">Te has equivocado.</p>
        <button onclick="closeOverlay()">Intentar de nuevo</button>
    </div>

    <div id="credits">Creado por el Prof. Gastón</div>
</div>

<script>
    const allData = [
        { l: '👷‍♂️', r: '🚜', id: 'const' },
        { l: '👨‍🚒', r: '🚒', id: 'bomb' },
        { l: '👨‍⚕️', r: '🚑', id: 'med' },
        { l: '👨‍🍳', r: '🍳', id: 'coc' },
        { l: '👮‍♂️', r: '🚔', id: 'pol' },
        { l: '👨‍🚀', r: '🚀', id: 'astro' },
        { l: '👨‍🔧', r: '🔧', id: 'meca' },
        { l: '🕵️‍♂️', r: '🔍', id: 'detec' },
        { l: '📬', r: '✉️', id: 'cart' },
        { l: '💇‍♂️', r: '✂️', id: 'pelu' },
        { l: '👨‍🎨', r: '🎨', id: 'pintor' },
        { l: '👨‍🌾', r: '🪴', id: 'jardi' }, // Regadera/Planta clara
        { l: '🥋', r: '🏆', id: 'deport' }
    ];

    let currentLevel = 1;
    let matches = 0;
    let selectedItem = null;
    let currentLines = [];
    const canvas = document.getElementById('lineCanvas');
    const ctx = canvas.getContext('2d');

    // Función de sonido
    function playSound(type) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if(type === 'win') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    function showOverlay(title, msg, emoji, isWin) {
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-msg').innerText = msg;
        document.getElementById('overlay-emoji').innerText = emoji;
        document.getElementById('overlay').style.display = 'flex';
        playSound(isWin ? 'win' : 'lose');
    }

    function closeOverlay() {
        document.getElementById('overlay').style.display = 'none';
        currentLevel = 1;
        initLevel();
    }

    function initLevel() {
        matches = 0;
        selectedItem = null;
        currentLines = [];
        clearCanvas();
        document.getElementById('level-indicator').innerText = `Nivel ${currentLevel}`;
        
        const numPairs = currentLevel + 2;
        const gameData = [...allData].sort(() => Math.random() - 0.5).slice(0, numPairs);
        
        const leftCol = document.getElementById('left-col');
        const rightCol = document.getElementById('right-col');
        leftCol.innerHTML = ''; rightCol.innerHTML = '';

        gameData.forEach(pair => leftCol.appendChild(createItem(pair.l, pair.id, 'left')));
        [...gameData].sort(() => Math.random() - 0.5).forEach(pair => rightCol.appendChild(createItem(pair.r, pair.id, 'right')));
        
        resizeCanvas();
    }

    function createItem(emoji, id, side) {
        const div = document.createElement('div');
        const sizeClass = (currentLevel <= 2) ? 'large-emoji' : 'normal-emoji';
        div.className = `item ${sizeClass}`;
        div.innerText = emoji;
        div.dataset.id = id;
        div.dataset.side = side;
        div.onclick = () => handleSelect(div);
        return div;
    }

    function handleSelect(element) {
        if (element.classList.contains('matched')) return;

        if (selectedItem && selectedItem.dataset.side === element.dataset.side) {
            selectedItem.classList.remove('selected');
            selectedItem = element;
            element.classList.add('selected');
            return;
        }

        if (!selectedItem) {
            selectedItem = element;
            element.classList.add('selected');
        } else {
            if (selectedItem.dataset.id === element.dataset.id) {
                // ACIERTO
                element.classList.add('matched');
                selectedItem.classList.add('matched');
                currentLines.push({el1: selectedItem, el2: element});
                drawLine(selectedItem, element);
                selectedItem.classList.remove('selected');
                selectedItem = null;
                matches++;
                playSound('win');

                if (matches === (currentLevel + 2)) {
                    if (currentLevel < 4) {
                        setTimeout(() => { currentLevel++; initLevel(); }, 800);
                    } else {
                        setTimeout(() => { 
                            showOverlay("¡EXCELENTE!", "¡Eres un maestro de los oficios!", "🏆", true);
                        }, 500);
                    }
                }
            } else {
                // ERROR - MOSTRAR CARTEL Y REINICIAR
                showOverlay("¡UPS!", "¡Volvamos a intentarlo!", "👂", false);
            }
        }
    }

    function drawLine(el1, el2) {
        const rect1 = el1.getBoundingClientRect();
        const rect2 = el2.getBoundingClientRect();
        const containerRect = canvas.getBoundingClientRect();
        const x1 = (rect1.left + rect1.right) / 2 - containerRect.left;
        const y1 = (rect1.top + rect1.bottom) / 2 - containerRect.top;
        const x2 = (rect2.left + rect2.right) / 2 - containerRect.left;
        const y2 = (rect2.top + rect2.bottom) / 2 - containerRect.top;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = '#27ae60';
        ctx.lineWidth = 8;
        ctx.lineCap = 'round';
        ctx.stroke();
    }

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        currentLines.forEach(line => drawLine(line.el1, line.el2));
    }

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    window.addEventListener('resize', resizeCanvas);
    initLevel();
</script>
</body>
</html>
