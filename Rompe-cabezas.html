<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Gamer Pro - Prof. Gastón</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #ffffff;
            --primary: #6c5ce7;
            --correct: #2ecc71;
            --wrong: #e74c3c;
            --card-back: #a29bfe;
        }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            background: var(--panel);
            width: 95%;
            max-width: 900px;
            height: 92vh;
            padding: 20px;
            border-radius: 40px;
            border: 8px solid var(--primary);
            box-shadow: 0 10px 0 #4834d4;
            text-align: center;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        #header { display: flex; justify-content: space-around; align-items: center; margin-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.8rem; }
        .stat-box { background: #f0f3f4; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; }
        #timer { color: var(--wrong); }

        #grid-container {
            flex-grow: 1;
            display: grid;
            gap: 20px;
            justify-content: center;
            align-content: center;
            margin: 0 auto;
            width: 100%;
        }

        /* Tamaños Dinámicos */
        .card { perspective: 1000px; cursor: pointer; }
        .card.size-large { width: 170px; height: 170px; font-size: 80px; }
        .card.size-medium { width: 125px; height: 125px; font-size: 60px; }
        .card.size-small { width: 95px; height: 95px; font-size: 45px; }

        .card-inner {
            position: relative;
            width: 100%; height: 100%;
            transition: transform 0.5s;
            transform-style: preserve-3d;
            border-radius: 20px;
        }

        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            border: 4px solid var(--primary);
            box-shadow: 0 6px 0 #ddd;
        }

        .card-back { background-color: var(--card-back); color: white; font-size: 40px; }
        .card-front { background-color: white; transform: rotateY(180deg); }

        #overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.96);
            z-index: 100;
            border-radius: 32px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }

        #overlay h2 { font-size: 3rem; color: var(--primary); margin: 10px; }
        #overlay p { font-size: 1.5rem; margin-bottom: 20px; }
        #overlay button {
            padding: 15px 40px; font-size: 1.4rem;
            background: var(--correct); color: white;
            border: none; border-radius: 20px; cursor: pointer;
            box-shadow: 0 6px 0 #1e8449;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Créditos Abajo a la Derecha */
        #credits {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 0.95rem;
            color: #7f8c8d;
            font-weight: bold;
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="level-indicator" class="stat-box">Nivel 1</div>
        <h1>🎮 Memoria Gamer</h1>
        <div id="timer" class="stat-box">01:00</div>
    </div>
    
    <div id="grid-container"></div>

    <div id="overlay">
        <h2 id="overlay-emoji">🏆</h2>
        <h2 id="overlay-title">¡Muy bien!</h2>
        <p id="overlay-msg"></p>
        <button onclick="closeOverlay()">Siguiente Nivel</button>
    </div>

    <div id="credits">Creado por el Prof. Gastón</div>
</div>

<script>
    const logos = [
        { icon: '⛏️', name: 'MC' }, { icon: '🚀', name: 'AU' },
        { icon: '🧱', name: 'RB' }, { icon: '🏎️', name: 'NF' },
        { icon: '⚽', name: 'Fifa' }, { icon: '🔫', name: 'FN' },
        { icon: '🧟', name: 'PvZ' }, { icon: '🏹', name: 'LoL' }
    ];

    let currentLevel = 1;
    let flippedCards = [];
    let matchedPairs = 0;
    let canFlip = true;
    let timerInterval;
    let timeLeft;

    // MEJORA DE SONIDOS (Web Audio API)
    function playSound(type) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const masterGain = audioCtx.createGain();
        masterGain.connect(audioCtx.destination);
        masterGain.gain.setValueAtTime(0.1, audioCtx.currentTime);

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(masterGain);

        if (type === 'match') { // Sonido de pareja encontrada
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'level-up') { // Sonido de ganar nivel
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        } else if (type === 'lose') { // Sonido de error o tiempo
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else { // Click normal
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = (currentLevel <= 2) ? 60 : 120;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                playSound('lose');
                showOverlay("¡TIEMPO!", "Se acabó el tiempo.", "⏰", false);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function initLevel() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = '';
        flippedCards = [];
        matchedPairs = 0;
        canFlip = true;
        document.getElementById('level-indicator').innerText = `Nivel ${currentLevel}`;

        const levels = {
            1: { pairs: 2, cols: 2, size: 'size-large' },
            2: { pairs: 3, cols: 3, size: 'size-large' },
            3: { pairs: 4, cols: 4, size: 'size-medium' },
            4: { pairs: 6, cols: 4, size: 'size-small' },
            5: { pairs: 8, cols: 4, size: 'size-small' }
        };

        const config = levels[currentLevel];
        grid.style.gridTemplateColumns = `repeat(${config.cols}, auto)`;

        let levelLogos = [...logos].sort(() => Math.random() - 0.5).slice(0, config.pairs);
        let gameCards = [...levelLogos, ...levelLogos].sort(() => Math.random() - 0.5);

        gameCards.forEach(logo => {
            const card = document.createElement('div');
            card.className = `card ${config.size}`;
            card.dataset.name = logo.name;
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-back">?</div>
                    <div class="card-front">${logo.icon}</div>
                </div>
            `;
            card.onclick = () => flipCard(card);
            grid.appendChild(card);
        });

        startTimer();
    }

    function flipCard(card) {
        if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
        playSound('click');
        card.classList.add('flipped');
        flippedCards.push(card);
        if (flippedCards.length === 2) {
            canFlip = false;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.name === card2.dataset.name) {
            card1.classList.add('matched');
            card2.classList.add('matched');
            matchedPairs++;
            flippedCards = [];
            canFlip = true;
            playSound('match');

            const totalPairsNeeded = [0, 2, 3, 4, 6, 8][currentLevel];
            if (matchedPairs === totalPairsNeeded) {
                clearInterval(timerInterval);
                setTimeout(() => {
                    playSound('level-up');
                    if (currentLevel < 5) {
                        showOverlay("¡LOGRADO!", `Nivel ${currentLevel} completado`, "🌟", true);
                    } else {
                        showOverlay("¡CAMPEÓN!", "¡Eres un experto de la memoria!", "🏆", true);
                    }
                }, 500);
            }
        } else {
            setTimeout(() => {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
                canFlip = true;
            }, 1000);
        }
    }

    function showOverlay(title, msg, emoji, success) {
        const overlay = document.getElementById('overlay');
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-msg').innerText = msg;
        document.getElementById('overlay-emoji').innerText = emoji;
        
        const btn = overlay.querySelector('button');
        btn.innerText = (!success) ? "Reintentar Nivel" : (currentLevel < 5 ? "Siguiente Nivel" : "Jugar de nuevo");
        btn.style.background = (!success) ? "var(--wrong)" : "var(--correct)";
        
        overlay.style.display = 'flex';
    }

    function closeOverlay() {
        const overlay = document.getElementById('overlay');
        overlay.style.display = 'none';
        
        if (document.getElementById('overlay-emoji').innerText === "🏆" || 
            document.getElementById('overlay-emoji').innerText === "⏰") {
            currentLevel = 1;
        } else if (document.getElementById('overlay-title').innerText === "¡LOGRADO!") {
            currentLevel++;
        }
        initLevel();
    }

    initLevel();
</script>
</body>
</html>
