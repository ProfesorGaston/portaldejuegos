<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Juegos - Prof. Gastón</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* Importamos Noto Color Emoji de Google Fonts junto con las otras fuentes */
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;800&family=Noto+Color+Emoji&display=swap');

        :root {
            --bg-base: #0a0a0b;
            --accent-color: #e50914;
            --card-width: 19vw;
            --card-gap: 2vw;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        body {
            background-color: var(--bg-base);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        /* --- SISTEMA DE LOGIN --- */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1f 0%, #0a0a0b 100%);
            z-index: 20000; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: rgba(0, 0, 0, 0.6); padding: 50px 40px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05); width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
        }

        .login-card h1 { 
            font-family: 'Bebas Neue', cursive; font-size: 3rem; 
            color: var(--accent-color); margin-bottom: 30px; letter-spacing: 2px; line-height: 1;
        }

        .login-form input {
            width: 100%; padding: 15px; margin-bottom: 15px; background: #222; border: 1px solid #333;
            border-radius: 5px; color: white; font-family: 'Montserrat', sans-serif; font-size: 1rem; outline: none;
        }

        .login-form input:focus { border-color: var(--accent-color); }

        .login-btn {
            width: 100%; padding: 15px; background: var(--accent-color); color: white; border: none;
            border-radius: 5px; font-weight: bold; font-family: 'Montserrat', sans-serif; cursor: pointer;
            font-size: 1.1rem; transition: background 0.3s; margin-top: 10px;
        }

        .login-btn:hover { background: #b20710; }

        .error-msg { color: #e50914; font-size: 0.9rem; margin-top: 15px; display: none; font-weight: 600; }
        
        .login-footer { margin-top: 25px; font-size: 0.85rem; color: #777; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}

        /* --- ENVOLTORIO PRINCIPAL (Oculto al inicio) --- */
        #main-app { opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        #main-app.visible { opacity: 1; pointer-events: auto; }

        /* --- FONDO --- */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: radial-gradient(circle at 0% 0%, #1a1a1f 0%, #0a0a0b 100%);
        }

        /* --- LOADER NETFLIX --- */
        #loader-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; justify-content: center; align-items: center;
            flex-direction: column; z-index: 10000;
        }
        .netflix-spinner {
            width: 50px; height: 50px; border: 4px solid rgba(229, 9, 20, 0.2);
            border-top: 4px solid var(--accent-color); border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- HEADER --- */
        .top-header {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 4vh 5vw; display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .brand { font-family: 'Bebas Neue', cursive; color: var(--accent-color); font-size: 2.5rem; letter-spacing: 3px; }
        
        .prof-badge {
            font-size: 0.9rem; 
            font-weight: 600; 
            opacity: 0.8;
            font-family: 'Noto Color Emoji', 'Montserrat', sans-serif;
        }

        /* --- HERO SECTION --- */
        .hero-section { 
            position: absolute; 
            top: 12vh; 
            right: 0; 
            width: 100%; 
            z-index: 30; 
            pointer-events: none; 
        }
        .hero-content { 
            width: 45%; 
            margin-left: auto; 
            padding-right: 5vw; 
            text-align: right; 
            display: flex; 
            flex-direction: column; 
            align-items: flex-end; 
        }
        .hero-category { color: var(--accent-color); font-weight: 800; text-transform: uppercase; font-size: 1.2vw; letter-spacing: 2px; margin-bottom: 10px; }
        .hero-logo { font-family: 'Bebas Neue', cursive; font-size: 3.5vw; line-height: 1; margin-bottom: 15px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .hero-desc { font-size: 1.1vw; color: #ccc; max-width: 90%; line-height: 1.5; font-weight: 400; }

        /* --- FILAS DE JUEGOS --- */
        .rows-viewport { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            height: 85vh; 
            z-index: 20; 
            overflow: hidden; 
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 100%);
        }
        .rows-container { 
            display: flex; flex-direction: column; gap: 5vh; 
            padding-top: 15vh; 
            padding-bottom: 10vh; 
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1); 
            will-change: transform; transform: translateZ(0); 
        }
        .row { display: flex; flex-direction: column; gap: 15px; }
        .row-title { font-size: 1vw; font-weight: 600; color: rgba(255,255,255,0.4); padding-left: 5vw; text-transform: uppercase; letter-spacing: 1px; }
        .row.active-row .row-title { color: #fff; }
        .row-cards { display: flex; gap: var(--card-gap); padding-left: 5vw; align-items: center; }

        /* --- TARJETAS --- */
        .card {
            flex: 0 0 var(--card-width); aspect-ratio: 16 / 9;
            border-radius: 6px; 
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            cursor: pointer; border: 2px solid transparent;
            transition: transform 0.3s ease, background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            transform: translateZ(0);
        }
        .card-icon { 
            font-size: 3vw; 
            margin-bottom: 8px; 
            transition: transform 0.3s; 
            font-family: 'Noto Color Emoji', sans-serif;
            font-weight: normal; 
        }
        .card-title { font-size: 0.85vw; font-weight: 600; color: #ccc; text-align: center; }

        .card.active {
            transform: scale(1.1) translateZ(0);
            z-index: 50;
        }
        .card.active .card-icon { transform: scale(1.2); }
        .card.active .card-title { color: #fff; font-weight: 800; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-card">
            <h1>PORTAL DE JUEGOS</h1>
            <div class="login-form">
                <input type="text" id="user" placeholder="Usuario">
                <input type="password" id="pass" placeholder="Contraseña">
                <button class="login-btn" onclick="checkLogin()">Ingresar</button>
                <div id="login-error" class="error-msg">Credenciales incorrectas. Intenta de nuevo.</div>
            </div>
            <div class="login-footer">Creado por el Prof. Gastón</div>
        </div>
    </div>

    <div id="loader-overlay">
        <div class="netflix-spinner"></div>
        <div id="loading-msg" style="margin-top:15px; font-family:'Bebas Neue'; color:#e50914; letter-spacing:2px; font-size: 1.5rem; text-align: center;">INICIANDO...</div>
    </div>

    <div id="main-app">
        <div class="bg-fixed"></div>

        <div class="top-header">
            <div class="brand" id="brand-logo">PORTAL DE JUEGOS</div>
            <div class="prof-badge">👨‍🏫 PROF. GASTÓN</div>
        </div>

        <div class="hero-section">
            <div class="hero-content">
                <div class="hero-category" id="hero-cat">CATEGORÍA</div>
                <h1 class="hero-logo" id="hero-title">TÍTULO DEL JUEGO</h1>
                <p class="hero-desc" id="hero-desc">Descripción...</p>
            </div>
        </div>

        <div class="rows-viewport">
            <div class="rows-container" id="rows-container"></div>
        </div>
    </div>

<script>
    // --- LÓGICA DE LOGIN ---
    function checkLogin() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value.trim();

        if (u === 'alumno' && p === 'fff') {
            sessionStorage.setItem('acceso_gaston', 'true');
            ingresarAlPortal();
        } else {
            document.getElementById('login-error').style.display = 'block';
            const card = document.querySelector('.login-card');
            card.style.transform = 'translateX(10px)';
            setTimeout(() => card.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => card.style.transform = 'translateX(0)', 200);
        }
    }

    function ingresarAlPortal() {
        document.getElementById('login-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').classList.add('visible');
            init(); 
        }, 500);
    }

    document.addEventListener('DOMContentLoaded', () => {
        if(sessionStorage.getItem('acceso_gaston') === 'true') {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-app').classList.add('visible');
            init();
        }
    });

    window.addEventListener('pageshow', function(event) {
        const loader = document.getElementById('loader-overlay');
        if (loader) loader.style.display = 'none';
    });

    // --- BASE DE DATOS ACTUALIZADA ---
    const data = [
        {
            category: "Lengua y Mecanografía", color: "#e50914",
            games: [
                { title: 'Lluvia de Letras', desc: 'Escribe rápido y destruye las letras.', icon: '⌨️', url: 'Lluvia de letras.html' },
                { title: 'Constructor de Palabras', desc: 'Une las piezas correctamente.', icon: '🧩', url: 'Constructor de palabras.html' },
                { title: 'Tren de Oraciones', desc: 'Ordena los vagones.', icon: '🚂', url: 'Tren de oraciones.html' },
                { title: 'Carreras de Teclado', desc: '¡Escribe palabras para ganar la carrera!', icon: '🏎️', url: 'Carreras de teclado.html' },
                { title: 'Regla Ortográfica', desc: 'Aprende las reglas de ortografía jugando.', icon: '📝', url: 'regla ortografica.html' },
                // NUEVO JUEGO INTEGRADO AQUÍ
                { title: 'Laboratorio de Clasificación', desc: 'Clasifica sustantivos, adjetivos y verbos volando.', icon: '🚀', url: 'Laboratorio de Clasificación.html' }
            ]
        },
        {
            category: "Lógica, Habilidad y Memoria", color: "#f5b041",
            games: [
                { title: 'La Hormiga', desc: 'Guía a la hormiga por el túnel.', icon: '🐜', url: 'La hormiga.html' },
                { title: 'Memoria Gamer', desc: 'Encuentra las parejas.', icon: '🎮', url: 'Rompe-cabezas.html' },
                { title: 'Pesca Marítima', desc: 'Atrapa los peces indicados.', icon: '🎣', url: 'Pesca maritima.html' },
                { title: '¿Quién suena?', desc: 'Descubre qué animal se oculta.', icon: '👂', url: 'Juego de sonidos animales.html' },
                { title: 'Conectando Oficios', desc: 'Relaciona a los profesionales.', icon: '👨‍🔧', url: 'Juego de oficios.html' },
                { title: 'Explosión de Burbujas', desc: 'Revienta las burbujas.', icon: '🔵', url: 'Explosion de burbujas.html' },
                { title: 'Héroe del Reciclaje', desc: 'Aprende a cuidar el planeta.', icon: '♻️', url: 'Reciclaje.html' },
                { title: 'Simón Dice', desc: 'Repite la secuencia.', icon: '🔔', url: 'Simon dice.html' },
                { title: 'Supermercado', desc: 'Administra tu dinero.', icon: '🛒', url: 'Supermercado.html' },
                { title: 'Cuerpo Humano', desc: 'Ubica los huesos y órganos.', icon: '🦴', url: 'Cuerpo humano.html' },
                { title: 'Desafío Saludable', desc: 'Alimentos nutritivos vs chatarra.', icon: '🍎', url: 'Desafio saludable.html' },
                { title: '¿Qué hora es?', desc: 'Aprende a leer relojes.', icon: '⏰', url: 'La hora.html' },
                { title: 'Sombras Misteriosas', desc: 'Adivina a quién pertenece la sombra.', icon: '👤', url: 'Sombras Misteriosas.html' },
                { title: 'Golpea al Topo', desc: '¡Sé rápido y golpea al topo!', icon: '🔨', url: 'Golpea al topo.html' }
            ]
        },
        {
            category: "Matemática Numérica", color: "#3498db",
            games: [
                { title: 'Penales Multiplicativos', desc: 'Calculá, apuntá y anota un golazo de matemáticas.', icon: '⚽', url: 'Penales Multiplicativos.html' },
                { title: 'Math Invaders', desc: 'Resuelve operaciones rápidas.', icon: '👾', url: 'Math Invaders.html' },
                { title: 'Pac-Mates', desc: 'Recorre el laberinto.', icon: '👻', url: 'Pacman de sumas.html' },
                { title: 'Safari Numérico', desc: 'Cuenta animales.', icon: '🐾', url: 'Juego de conteo del 1 al 20 animales.html' },
                { title: 'La Huerta', desc: 'Cosecha vegetales.', icon: '🥦', url: 'Juego de conteo del 1 al 20 vegetales.html' },
                { title: 'Estación Numérica', desc: 'Cuenta transportes.', icon: '🚢', url: 'Juego de conteo del 1 al 20 transportes.html' },
                { title: 'Flappy Fractions', desc: 'Aprende fracciones volando.', icon: '🐦', url: 'Flappy fractions.html' },
                { title: 'Mario X', desc: 'Aprende a multiplicar.', icon: '🍄', url: 'Mario X.html' },
                { title: 'A contar', desc: 'Cuenta y guarda los objetos.', icon: '🧸', url: 'A contar.html' }
            ]
        },
        {
            category: "Programación", color: "#2ecc71",
            games: [ { title: 'Robot Explorador', desc: 'Utiliza bloques lógicos.', icon: '🤖', url: 'Robot explorador.html' } ]
        },
        {
            category: "Informática", color: "#00f2fe",
            games: [ { title: 'System_Search', desc: 'Sopa de letras de componentes.', icon: '🔍', url: 'System_Search.html' } ]
        }
    ];

    let processedRows = [];
    let currentRow = 0, currentCol = 0;
    const container = document.getElementById('rows-container');

    // Función que transforma los datos en filas de a 4 juegos
    function buildRows() {
        processedRows = [];
        data.forEach(item => {
            for (let i = 0; i < item.games.length; i += 4) {
                processedRows.push({ 
                    displayTitle: i === 0 ? item.category : "", 
                    realCategory: item.category, 
                    color: item.color, 
                    games: item.games.slice(i, i + 4) 
                });
            }
        });
    }

    function launchGame(url, title) {
        const loader = document.getElementById('loader-overlay');
        document.getElementById('loading-msg').innerText = title.toUpperCase();
        document.getElementById('loading-msg').style.color = processedRows[currentRow].color;
        loader.style.display = 'flex';
        setTimeout(() => { window.location.href = url; }, 1000); 
    }

    function init() {
        buildRows();
        container.innerHTML = '';
        
        processedRows.forEach((row, rIdx) => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'row'; rowDiv.id = `row-${rIdx}`;
            rowDiv.innerHTML = `<div class="row-title">${row.displayTitle}</div><div class="row-cards" id="cards-${rIdx}"></div>`;
            container.appendChild(rowDiv);
            
            row.games.forEach((game, cIdx) => {
                const card = document.createElement('div');
                card.className = 'card'; card.id = `card-${rIdx}-${cIdx}`;
                card.innerHTML = `<div class="card-icon">${game.icon}</div><div class="card-title">${game.title}</div>`;
                
                card.dataset.baseBg = row.color + '15'; 
                card.dataset.baseBorder = row.color + '40'; 
                card.style.backgroundColor = card.dataset.baseBg;
                card.style.borderColor = card.dataset.baseBorder;

                card.onclick = () => { 
                    currentRow = rIdx; 
                    currentCol = cIdx; 
                    render();
                    launchGame(game.url, game.title); 
                };
                document.getElementById(`cards-${rIdx}`).appendChild(card);
            });
        });
        render();
    }

    function render() {
        if(processedRows.length === 0) return;

        document.querySelectorAll('.card').forEach(c => {
            c.classList.remove('active');
            c.style.backgroundColor = c.dataset.baseBg;
            c.style.borderColor = c.dataset.baseBorder;
            c.style.boxShadow = 'none'; 
        });
        
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active-row'));

        const color = processedRows[currentRow].color;
        const currentCard = document.getElementById(`card-${currentRow}-${currentCol}`);
        
        if(currentCard) {
            currentCard.classList.add('active');
            currentCard.style.backgroundColor = color + '35'; 
            currentCard.style.borderColor = color; 
            currentCard.style.boxShadow = `0 0 20px ${color}60`; 
            document.getElementById(`row-${currentRow}`).classList.add('active-row');
        }

        const rowElement = document.querySelector('.row');
        if(rowElement) {
            const rowHeight = rowElement.offsetHeight + (window.innerHeight * 0.05);
            container.style.transform = `translate3d(0, -${currentRow * rowHeight}px, 0)`;
        }

        const game = processedRows[currentRow].games[currentCol];

        document.getElementById('hero-title').innerText = game.title;
        document.getElementById('hero-desc').innerText = game.desc;
        document.getElementById('hero-cat').innerText = processedRows[currentRow].realCategory;
        document.getElementById('hero-cat').style.color = color;
    }

    // --- SISTEMA SECRETO (KEYLOGGER) ---
    let secretBuffer = "";
    let extrasUnlocked = false;

    function unlockExtras() {
        if (extrasUnlocked) return;
        extrasUnlocked = true;

        // Añadimos la categoría secreta con los juegos de acción
        data.push({
            category: "Extras Secretos", color: "#9b59b6",
            games: [
                { title: 'Buuñ Shooter', desc: 'Acción de disparos, flechas y cosméticos.', icon: '🏹', url: '10.4.html' },
                { title: 'Neon Rider', desc: 'Carreras a toda velocidad en vista superior.', icon: '🏎️', url: 'anda sin parar.html' },
                { title: 'Fútbol 1vs1', desc: 'Partido de fútbol estilo 8-bits cara a cara.', icon: '⚽', url: 'Fut 1vs1 fin.html' },
                { title: 'Hell Zombi', desc: 'Sobrevive en la arena y derrota a los zombis.', icon: '🧟', url: 'hell zombi.html' },
                { title: 'Penalty Cup', desc: 'Patea penales, ataja y sé el campeón.', icon: '🥅', url: 'penales.html' },
                { title: 'Emoji Blast', desc: 'Explosión de colores y emojis al ritmo.', icon: '✨', url: 'tata y titi.html' }
            ]
        });

        // Feedback Visual
        const loader = document.getElementById('loader-overlay');
        const msg = document.getElementById('loading-msg');
        msg.innerHTML = "¡CÓDIGO DETECTADO!<br>EXTRAS DESBLOQUEADOS";
        msg.style.color = "#9b59b6";
        document.querySelector('.netflix-spinner').style.borderColor = "rgba(155, 89, 182, 0.2)";
        document.querySelector('.netflix-spinner').style.borderTopColor = "#9b59b6";
        
        loader.style.display = 'flex';
        
        setTimeout(() => { 
            loader.style.display = 'none'; 
            // Re-renderizamos todo el grid
            init();
            
            // Llevamos al usuario directamente a la primera fila de la nueva sección extra
            currentRow = processedRows.findIndex(r => r.realCategory === "Extras Secretos");
            currentCol = 0;
            render();
        }, 2000);
    }

    window.addEventListener('keydown', e => {
        // Bloqueo de controles si el login está activo
        if(sessionStorage.getItem('acceso_gaston') !== 'true') {
            if(e.key === 'Enter') checkLogin();
            return; 
        }

        // Registrar teclas para el código secreto
        secretBuffer += e.key;
        if (secretBuffer.length > 3) secretBuffer = secretBuffer.substring(1);
        if (secretBuffer === "031") {
            unlockExtras();
            secretBuffer = ""; 
        }

        // Navegación normal
        if(e.key === 'ArrowUp' && currentRow > 0) {
            currentRow--;
            if (currentCol >= processedRows[currentRow].games.length) currentCol = processedRows[currentRow].games.length - 1;
        }
        else if(e.key === 'ArrowDown' && currentRow < processedRows.length - 1) { 
            currentRow++; 
            if (currentCol >= processedRows[currentRow].games.length) currentCol = processedRows[currentRow].games.length - 1;
        }
        else if(e.key === 'ArrowLeft' && currentCol > 0) currentCol--;
        else if(e.key === 'ArrowRight' && currentCol < processedRows[currentRow].games.length - 1) currentCol++;
        else if(e.key === 'Enter') launchGame(processedRows[currentRow].games[currentCol].url, processedRows[currentRow].games[currentCol].title);
        
        render();
    });

    window.addEventListener('wheel', e => {
        if(sessionStorage.getItem('acceso_gaston') !== 'true') return;

        if (e.deltaY > 0 && currentRow < processedRows.length - 1) { currentRow++; currentCol = 0; }
        else if (e.deltaY < 0 && currentRow > 0) { currentRow--; currentCol = 0; }
        render();
    }, { passive: true });

</script>
</body>
</html>
