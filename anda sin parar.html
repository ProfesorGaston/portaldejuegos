<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Rider: Top-Down Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Orbitron', sans-serif; }
        #game-container { position: relative; border: 3px solid #f0f; box-shadow: 0 0 20px #f0f; border-radius: 10px; overflow: hidden; }
        canvas { display: block; background: #050005; }
        #ui { position: absolute; top: 20px; left: 20px; right: 20px; pointer-events: none; display: flex; justify-content: space-between; }
        .stat-box { text-align: center; }
        .label { font-size: 10px; color: #f0f; text-transform: uppercase; letter-spacing: 2px; }
        .value { font-size: 24px; color: #0ff; text-shadow: 0 0 10px #0ff; }
        #game-over { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(10, 0, 10, 0.95); padding: 40px; border: 2px solid #f0f; display: none; z-index: 100; box-shadow: 0 0 100px #f0f; }
        button { background: transparent; border: 2px solid #0ff; color: #0ff; padding: 10px 25px; font-family: 'Orbitron'; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0ff; color: #000; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui">
            <div class="stat-box">
                <div class="label">Puntaje</div>
                <div id="score" class="value">00000</div>
            </div>
            <div class="stat-box">
                <div class="label">Velocidad</div>
                <div id="speed" class="value">0 KM/H</div>
            </div>
        </div>
        
        <div id="game-over">
            <h1 style="color: #f0f; margin: 0;">SISTEMA DAÑADO</h1>
            <p id="final-score" style="color: #0ff;"></p>
            <button onclick="resetGame()">REINICIAR MOTOR</button>
        </div>

        <canvas id="canvas"></canvas>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 400;
    canvas.height = 650;

    let score = 0, gameActive = true, frame = 0, nitroActive = false, cameraShake = 0;
    const player = { x: 185, y: 520, w: 32, h: 55, velX: 0, currentRotation: 0, accel: 1.3, friction: 0.84 };
    const keys = {}, obstacles = [];

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- DIBUJO DE AUTO DESDE ARRIBA ---
    function drawTopDownCar(x, y, w, h, color, rotation = 0, isPlayer = false) {
        ctx.save();
        ctx.translate(x + w/2, y + h/2);
        ctx.rotate(rotation);

        // Brillo Neon
        ctx.shadowBlur = (nitroActive && isPlayer) ? 25 : 12;
        ctx.shadowColor = color;

        // 1. Ruedas (4 pequeñas cajas negras)
        ctx.fillStyle = "#111";
        const wheelW = 6, wheelH = 10;
        ctx.fillRect(-w/2 - 2, -h/2 + 8, wheelW, wheelH); // DI
        ctx.fillRect(w/2 - wheelW + 2, -h/2 + 8, wheelW, wheelH); // DD
        ctx.fillRect(-w/2 - 2, h/2 - 18, wheelW, wheelH); // TI
        ctx.fillRect(w/2 - wheelW + 2, h/2 - 18, wheelW, wheelH); // TD

        // 2. Carrocería (Cuerpo principal)
        ctx.fillStyle = "#000";
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        
        // Dibujamos una forma de auto más estilizada
        ctx.beginPath();
        ctx.roundRect(-w/2, -h/2, w, h, [10, 10, 5, 5]); 
        ctx.fill();
        ctx.stroke();

        // 3. Parabrisas (Cristal frontal)
        ctx.fillStyle = color;
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.moveTo(-w/2 + 4, -h/2 + 15);
        ctx.lineTo(w/2 - 4, -h/2 + 15);
        ctx.lineTo(w/2 - 6, -h/2 + 28);
        ctx.lineTo(-w/2 + 6, -h/2 + 28);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1.0;

        // 4. Alerón Trasero o Techo
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.strokeRect(-w/2 + 4, h/2 - 12, w - 8, 4);

        if(isPlayer) {
            // Faros delanteros (Luz Xenón)
            ctx.shadowColor = "#fff";
            ctx.fillStyle = "#fff";
            ctx.fillRect(-w/2 + 4, -h/2 - 2, 6, 4);
            ctx.fillRect(w/2 - 10, -h/2 - 2, 6, 4);
            
            // Luz de freno trasera
            ctx.fillStyle = nitroActive ? "#f00" : "#500";
            ctx.fillRect(-w/2 + 5, h/2 - 2, w-10, 3);
        }
        ctx.restore();
    }

    function createObstacle() {
        const types = [
            { w: 34, h: 58, color: '#0f0', speed: 4 }, // Auto Civil
            { w: 20, h: 42, color: '#f0f', speed: 7 }, // Moto
            { w: 45, h: 95, color: '#ff0', speed: 2.5 } // Camión
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        obstacles.push({
            x: Math.random() * (canvas.width - t.w),
            y: -150, ...t,
            speed: t.speed + (score/4000)
        });
    }

    function update() {
        if (!gameActive) return;
        nitroActive = (keys['ArrowUp'] || keys['KeyW']);
        cameraShake = nitroActive ? Math.random() * 4 : 0;

        if (keys['ArrowLeft'] || keys['KeyA']) {
            player.velX -= player.accel;
            player.currentRotation = -0.15;
        } else if (keys['ArrowRight'] || keys['KeyD']) {
            player.velX += player.accel;
            player.currentRotation = 0.15;
        } else {
            player.currentRotation *= 0.8;
        }

        player.velX *= player.friction;
        player.x += player.velX;
        if (player.x < 5) player.x = 5;
        if (player.x > canvas.width - player.w - 5) player.x = canvas.width - player.w - 5;

        if (frame % 40 === 0) createObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y += nitroActive ? o.speed + 6 : o.speed;

            if (player.x < o.x + o.w && player.x + player.w > o.x && 
                player.y < o.y + o.h && player.y + player.h > o.y) {
                gameActive = false;
                document.getElementById('game-over').style.display = 'block';
                document.getElementById('final-score').innerText = "SCORE: " + Math.floor(score);
            }
            if (o.y > canvas.height) { obstacles.splice(i, 1); score += 100; }
        }
        score += nitroActive ? 5 : 1;
        frame++;
    }

    function draw() {
        ctx.save();
        if(cameraShake > 0) ctx.translate(Math.random() * cameraShake, Math.random() * cameraShake);
        ctx.fillStyle = '#050005';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Grid de fondo
        ctx.strokeStyle = '#202';
        const offset = (frame * (nitroActive ? 15 : 7)) % 50;
        for(let y = offset; y < canvas.height; y += 50) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }

        ctx.globalCompositeOperation = 'lighter';
        obstacles.forEach(o => drawTopDownCar(o.x, o.y, o.w, o.h, o.color));
        drawTopDownCar(player.x, player.y, player.w, player.h, '#0ff', player.currentRotation, true);
        ctx.restore();

        document.getElementById('score').innerText = String(Math.floor(score)).padStart(5, '0');
        document.getElementById('speed').innerText = `${Math.floor((nitroActive ? 220 : 120) + (score/200))} KM/H`;
    }

    function loop() {
        update();
        draw();
        if (gameActive) requestAnimationFrame(loop);
    }

    function resetGame() {
        score = 0; frame = 0; obstacles.length = 0;
        player.x = 185; player.velX = 0;
        gameActive = true;
        document.getElementById('game-over').style.display = 'none';
        loop();
    }
    loop();
</script>
</body>
</html>
