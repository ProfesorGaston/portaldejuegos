<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Supermercado - Prof. Gastón</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@600&display=swap');

        :root {
            --color-l1: #27ae60;
            --color-l2: #2980b9;
            --color-l3: #8e44ad;
        }

        body {
            background-color: #f7f1e3;
            font-family: 'Open Sans', sans-serif;
            margin: 0; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            user-select: none; overflow: hidden;
        }

        .watermark {
            position: fixed; bottom: 10px; right: 15px;
            color: rgba(0, 0, 0, 0.15); font-family: 'Fredoka One'; font-size: 1rem;
            pointer-events: none; z-index: 999;
        }

        /* --- MENÚ DE INICIO (ESTILO TIENDA) --- */
        #level-selector {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ecf0f1;
            background-image: radial-gradient(#bdc3c7 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 200;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Toldo de tienda */
        .shop-awning {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: repeating-linear-gradient(
                90deg,
                #e74c3c,
                #e74c3c 40px,
                #ecf0f1 40px,
                #ecf0f1 80px
            );
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .shop-awning::after {
            content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 20px;
            background: radial-gradient(circle, #ecf0f1 10px, transparent 11px);
            background-size: 40px 40px; background-position: -10px -20px;
        }

        .menu-board {
            background: white;
            padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 4px solid #34495e;
            text-align: center; max-width: 800px; width: 90%;
            position: relative;
        }

        .menu-title {
            font-family: 'Fredoka One'; font-size: 3.5rem; color: #2c3e50;
            margin-bottom: 30px; line-height: 1; text-transform: uppercase;
            border-bottom: 4px dashed #bdc3c7; padding-bottom: 20px;
        }

        .levels-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
        }

        .level-ticket {
            background: #f1f2f6;
            width: 160px; padding: 15px;
            border-radius: 10px; border: 2px solid #ccc;
            cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
            position: relative; overflow: hidden;
        }

        .level-ticket:hover { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-color: #34495e; }
        
        .tag-hole {
            width: 15px; height: 15px; background: #34495e; border-radius: 50%;
            margin: 0 auto 10px auto;
        }

        .lt-title { font-family: 'Fredoka One'; font-size: 1.4rem; color: #2c3e50; margin-bottom: 5px; }
        .lt-desc { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
        .lt-price {
            background: #2c3e50; color: white; padding: 5px; border-radius: 5px;
            font-weight: bold; font-family: 'Courier New', monospace;
        }
        
        /* Colores por nivel */
        .l1 .lt-price { background: var(--color-l1); }
        .l2 .lt-price { background: var(--color-l2); }
        .l3 .lt-price { background: var(--color-l3); }


        /* --- CINTA TRANSPORTADORA --- */
        #conveyor-system {
            width: 100%; max-width: 600px; height: 180px;
            position: relative; overflow: hidden;
            background: #95a5a6; border-top: 5px solid #7f8c8d; border-bottom: 5px solid #7f8c8d;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.3); margin-bottom: 10px; display: flex; align-items: flex-end;
        }

        .conveyor-belt {
            width: 200%; height: 40px;
            background: repeating-linear-gradient(90deg, #34495e 0px, #34495e 20px, #2c3e50 20px, #2c3e50 24px);
            position: absolute; bottom: 0; left: 0;
            animation: moveBelt 2s linear infinite;
        }
        @keyframes moveBelt { from { transform: translateX(0); } to { transform: translateX(-40px); } }

        #scanner-zone {
            position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
            width: 80px; height: 100%;
            border-left: 4px solid rgba(0,0,0,0.2); border-right: 4px solid rgba(0,0,0,0.2);
            z-index: 10;
        }
        #scanner-light {
            position: absolute; bottom: 45px; width: 100%; height: 4px;
            background: #e74c3c; box-shadow: 0 0 15px #e74c3c; opacity: 0; transition: opacity 0.1s;
        }

        #price-display {
            position: absolute; top: 15px; right: 20px;
            background: #2d3436; color: #00cec9;
            font-family: 'Courier New', monospace; font-size: 2.2rem; font-weight: bold;
            padding: 5px 15px; border-radius: 5px; border: 4px solid #636e72; z-index: 20;
        }

        /* ITEM PRODUCTO */
        #product-item {
            font-size: 5.5rem; position: absolute; bottom: 40px; left: 110%;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.3)); z-index: 15;
            will-change: left; /* Optimización de rendimiento */
        }
        /* Clases de animación controladas por JS */
        .prod-center { left: 50% !important; transform: translateX(-50%); transition: left 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .prod-exit { left: -30% !important; transition: left 0.6s ease-in; }
        .prod-reset { left: 110% !important; transition: none !important; }

        /* --- INTERFAZ --- */
        .top-bar {
            width: 95%; max-width: 500px; display: flex; justify-content: space-between;
            background: rgba(255,255,255,0.9); padding: 8px 15px; border-radius: 15px; margin-bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .info-pill { font-family: 'Fredoka One'; font-size: 1.2rem; color: #2c3e50; }

        #checkout-counter {
            background: #d1ccc0; width: 95%; max-width: 500px;
            border-radius: 0 0 15px 15px; padding: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 10px; box-sizing: border-box;
        }

        #payment-zone {
            background-color: #f5f6fa; border: 2px dashed #b2bec3;
            border-radius: 10px; height: 140px; display: flex; flex-wrap: wrap;
            align-content: flex-start; padding: 10px; gap: 5px; overflow-y: auto;
        }

        #current-total-display { text-align: right; font-weight: bold; color: #2d3436; font-size: 1.2rem; }
        .correct-total { color: #27ae60 !important; }
        .wrong-total { color: #c0392b !important; }

        #wallet { display: flex; justify-content: center; gap: 8px; margin-top: 15px; flex-wrap: wrap; max-width: 600px; }
        
        .money-btn {
            border: none; cursor: pointer; border-radius: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            font-family: 'Fredoka One'; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
        }
        .money-btn:active { transform: translateY(4px); box-shadow: none; }
        .bill { width: 80px; height: 45px; color: white; text-shadow: 1px 1px 0 rgba(0,0,0,0.3); }
        .coin { width: 45px; height: 45px; border-radius: 50%; color: #8e6e22; border: 2px dashed #b79038; }
        .m-1000 { background: #e67e22; border: 2px solid #d35400; } 
        .m-100 { background: #9b59b6; border: 2px solid #8e44ad; } 
        .m-10 { background: #7f5a46; border: 2px solid #583e31; }  
        .m-1 { background: #f1c40f; border: 4px solid #f39c12; }   

        #game-controls { display: flex; gap: 15px; width: 100%; }
        .action-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-family: 'Fredoka One'; color: white; cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,0.2); font-size: 1.1rem; }
        .btn-clear { background: #e74c3c; } .btn-check { background: #2ecc71; }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }

        /* MODALES */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 300;
            display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; text-align: center;
        }
        .modal-btn { padding: 12px 30px; font-size: 1.3rem; border: none; border-radius: 50px; cursor: pointer; font-family: 'Fredoka One'; color: white; }
        
        .money-anim { animation: dropIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes dropIn { 0%{transform: scale(0) translateY(-50px); opacity:0;} 100%{transform: scale(1) translateY(0); opacity:1;} }
        
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform:translateX(0);} 25% {transform:translateX(-10px);} 75% {transform:translateX(10px);} }
        
        #feedback-msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 5rem; pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 100;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

    </style>
</head>
<body>

    <div class="watermark">Creado por el Prof. Gastón</div>

    <div id="level-selector">
        <div class="shop-awning"></div>
        
        <div class="menu-board">
            <div class="menu-title">🛒 Caja Rápida</div>
            
            <div class="levels-container">
                <div class="level-ticket l1" onclick="startGame(1)">
                    <div class="tag-hole"></div>
                    <div class="lt-title">Nivel 1</div>
                    <div class="lt-desc">25 Clientes</div>
                    <div class="lt-price">Hasta $99</div>
                </div>

                <div class="level-ticket l2" onclick="startGame(2)">
                    <div class="tag-hole"></div>
                    <div class="lt-title">Nivel 2</div>
                    <div class="lt-desc">20 Clientes</div>
                    <div class="lt-price">Hasta $999</div>
                </div>

                <div class="level-ticket l3" onclick="startGame(3)">
                    <div class="tag-hole"></div>
                    <div class="lt-title">Nivel 3</div>
                    <div class="lt-desc">15 Clientes</div>
                    <div class="lt-price">Hasta $9.999</div>
                </div>
            </div>
        </div>
    </div>

    <div id="victory-modal" class="modal-overlay">
        <div style="font-size: 5rem;">🏆</div>
        <h1 style="color:#f1c40f; font-size: 3rem; margin:0;">¡Turno Terminado!</h1>
        <p style="color:white; font-size: 1.5rem;">Caja cerrada perfectamente.</p>
        <button class="modal-btn btn-check" onclick="location.reload()">Volver al Menú</button>
    </div>
    <div id="gameover-modal" class="modal-overlay">
        <div style="font-size: 5rem;">😢</div>
        <h1 style="color:#e74c3c; font-size: 3rem; margin:0;">Caja Cerrada</h1>
        <p style="color:white; font-size: 1.5rem;">Demasiados errores hoy.</p>
        <button class="modal-btn btn-clear" onclick="location.reload()">Intentar de nuevo</button>
    </div>

    <div class="top-bar">
        <div class="info-pill">Cliente: <span id="r-current">1</span>/<span id="r-total">25</span></div>
        <div class="info-pill" id="lives-display">❤️❤️❤️❤️❤️</div>
    </div>

    <div id="conveyor-system">
        <div id="price-display">$<span id="target-price">?</span></div>
        <div class="conveyor-belt"></div>
        <div id="scanner-zone">
            <div id="scanner-light"></div>
        </div>
        <div id="product-item">🍎</div>
    </div>
    
    <div id="feedback-msg">👍</div>

    <div id="checkout-counter">
        <div id="payment-zone"></div>
        <div id="current-total-display">Pagado: $0</div>
        <div id="game-controls">
            <button class="action-btn btn-clear" onclick="clearPayment()">Borrar</button>
            <button class="action-btn btn-check" onclick="checkPayment()">¡Pagar!</button>
        </div>
    </div>

    <div id="wallet"></div>

<script>
    // --- LÓGICA DE JUEGO ---
    let currentLevel = 1;
    let targetPrice = 0;
    let currentPay = 0;
    let roundCount = 1;
    let maxRounds = 25;
    let lives = 5;
    let isGameOver = false;
    let availableProducts = [];
    let isAnimating = false;

    const masterProductList = [
        {e:'🍎', n:'Manzana'}, {e:'🍐', n:'Pera'}, {e:'🍊', n:'Naranja'}, {e:'🍌', n:'Banana'}, 
        {e:'🍉', n:'Sandía'}, {e:'🍇', n:'Uvas'}, {e:'🍓', n:'Frutilla'}, {e:'🍒', n:'Cereza'}, 
        {e:'🍍', n:'Ananá'}, {e:'🍅', n:'Tomate'}, {e:'🥑', n:'Palta'}, {e:'🥕', n:'Zanahoria'},
        {e:'🍞', n:'Pan'}, {e:'🥐', n:'Medialuna'}, {e:'🧀', n:'Queso'}, {e:'🥚', n:'Huevo'}, 
        {e:'🍔', n:'Hamburguesa'}, {e:'🍟', n:'Papas'}, {e:'🍕', n:'Pizza'}, {e:'🌭', n:'Pancho'}, 
        {e:'🍦', n:'Helado'}, {e:'🍫', n:'Chocolate'}, {e:'🍬', n:'Caramelo'}, {e:'🍭', n:'Chupetín'}, 
        {e:'🥛', n:'Leche'}, {e:'🧃', n:'Jugo'}, {e:'🧸', n:'Oso'}, {e:'⚽', n:'Pelota'}, 
        {e:'🚗', n:'Auto'}, {e:'🧼', n:'Jabón'}, {e:'📚', n:'Libro'}, {e:'✏️', n:'Lápiz'}
    ];

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if(type === 'scan') { 
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        } else if(type === 'coin') {
            osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
            osc.start(); osc.stop(audioCtx.currentTime+0.1);
        } else if(type === 'win') {
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime+0.2);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.4);
            osc.start(); osc.stop(audioCtx.currentTime+0.4);
        } else if(type === 'error') {
            osc.type = 'sawtooth'; osc.frequency.value = 150;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3);
            osc.start(); osc.stop(audioCtx.currentTime+0.3);
        }
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function startGame(lvl) {
        currentLevel = lvl;
        roundCount = 1;
        lives = 5;
        isGameOver = false;

        if(currentLevel === 1) maxRounds = 25;
        if(currentLevel === 2) maxRounds = 20;
        if(currentLevel === 3) maxRounds = 15;

        availableProducts = [...masterProductList];
        shuffleArray(availableProducts);

        document.getElementById('r-current').innerText = roundCount;
        document.getElementById('r-total').innerText = maxRounds;
        updateLivesDisplay();

        document.getElementById('level-selector').style.display = 'none';
        
        setupWallet();
        nextProduct(true);
    }

    function updateLivesDisplay() {
        let hearts = "❤️".repeat(lives) + "🖤".repeat(5 - lives);
        document.getElementById('lives-display').innerText = hearts;
    }

    function setupWallet() {
        const w = document.getElementById('wallet'); w.innerHTML = '';
        if(currentLevel >= 3) w.appendChild(createMoneyBtn(1000, 'm-1000', 'bill'));
        if(currentLevel >= 2) w.appendChild(createMoneyBtn(100, 'm-100', 'bill'));
        w.appendChild(createMoneyBtn(10, 'm-10', 'bill'));
        w.appendChild(createMoneyBtn(1, 'm-1', 'coin'));
    }

    function createMoneyBtn(val, cssClass, shape) {
        const btn = document.createElement('button');
        btn.className = `money-btn ${cssClass} ${shape}`;
        btn.innerText = '$' + val;
        btn.onclick = () => addMoney(val, cssClass, shape);
        return btn;
    }

    function nextProduct(isFirst = false) {
        isAnimating = true;

        clearPayment();
        
        // Precio
        let maxPrice = 99;
        if(currentLevel === 2) maxPrice = 999;
        if(currentLevel === 3) maxPrice = 9999;
        targetPrice = Math.floor(Math.random() * maxPrice) + 1;
        document.getElementById('target-price').innerText = "?";

        // Producto
        if(availableProducts.length === 0) {
            availableProducts = [...masterProductList];
            shuffleArray(availableProducts);
        }
        const prod = availableProducts.pop();

        // ELEMENTO DOM
        const item = document.getElementById('product-item');
        
        // 1. ELIMINAR CUALQUIER CLASE DE ANIMACIÓN PREVIA Y MOVER A LA DERECHA SIN TRANSICIÓN
        item.style.transition = 'none';
        item.className = ''; 
        item.classList.add('prod-reset'); // Forzar posición derecha (110%)
        
        // 2. CAMBIAR EMOJI
        item.innerText = prod.e;

        // 3. FORZAR REFLOW 
        void item.offsetWidth;

        // 4. ANIMAR HACIA EL CENTRO
        item.style.transition = ''; 
        item.classList.remove('prod-reset');
        
        setTimeout(() => {
            item.classList.add('prod-center'); 
            
            // 5. CUANDO LLEGA AL CENTRO (Scan)
            setTimeout(() => {
                playSound('scan');
                document.getElementById('scanner-light').style.opacity = '1';
                document.getElementById('target-price').innerText = targetPrice;
                
                setTimeout(() => {
                    document.getElementById('scanner-light').style.opacity = '0';
                    isAnimating = false; // DESBLOQUEAR JUEGO
                }, 200);
            }, 1000); 
        }, 50);
    }

    function addMoney(val, cssClass, shape) {
        if(isGameOver || isAnimating) return;
        currentPay += val;
        updateTotalDisplay();
        
        const zone = document.getElementById('payment-zone');
        const el = document.createElement('div');
        el.className = `money-btn ${cssClass} ${shape} money-anim`;
        el.innerText = '$' + val;
        el.style.transform = `rotate(${Math.random() * 10 - 5}deg)`;
        el.onclick = function() {
            if(isGameOver || isAnimating) return;
            this.remove(); currentPay -= val;
            updateTotalDisplay(); playSound('paper');
        };
        zone.appendChild(el);
        zone.scrollTop = zone.scrollHeight;
        playSound(val === 1 ? 'coin' : 'paper');
    }

    function clearPayment() {
        if(isGameOver) return;
        currentPay = 0;
        document.getElementById('payment-zone').innerHTML = '';
        updateTotalDisplay();
    }

    function updateTotalDisplay() {
        const disp = document.getElementById('current-total-display');
        disp.innerText = 'Pagado: $' + currentPay;
        disp.classList.remove('wrong-total', 'correct-total');
        if(currentPay === targetPrice) disp.classList.add('correct-total');
        else if(currentPay > targetPrice) disp.classList.add('wrong-total');
    }

    function checkPayment() {
        if(isGameOver || isAnimating) return;

        if(currentPay === targetPrice) {
            // ACIERTO
            playSound('win');
            showFeedback("¡BIEN!", "✅");
            
            // Bloquear inputs mientras sale el producto
            isAnimating = true;

            // ANIMACIÓN SALIDA (Izquierda)
            const item = document.getElementById('product-item');
            item.classList.remove('prod-center');
            item.classList.add('prod-exit');

            setTimeout(() => {
                // Chequear Fin de Nivel
                if(roundCount >= maxRounds) {
                    document.getElementById('victory-modal').style.display = 'flex';
                } else {
                    roundCount++;
                    document.getElementById('r-current').innerText = roundCount;
                    nextProduct(); // Llamar al siguiente
                }
            }, 600); 

        } else {
            handleError();
        }
    }

    function handleError() {
        playSound('error');
        lives--;
        updateLivesDisplay();
        const counter = document.getElementById('checkout-counter');
        counter.classList.add('shake');
        setTimeout(() => counter.classList.remove('shake'), 500);

        if(currentPay < targetPrice) showFeedback("Falta plata", "📉");
        else showFeedback("Te pasaste", "📈");

        if(lives <= 0) {
            isGameOver = true;
            setTimeout(() => { document.getElementById('gameover-modal').style.display = 'flex'; }, 1000);
        }
    }

    function showFeedback(text, emoji) {
        const msg = document.getElementById('feedback-msg');
        msg.innerText = emoji; msg.style.opacity = 1;
        setTimeout(() => { msg.style.opacity = 0; }, 1000);
    }
</script>
</body>
</html>
