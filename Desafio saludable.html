<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutri-Swipe - Prof. Gastón</title>
    <style>
        /* 1. Importamos Noto Color Emoji junto a tus otras fuentes */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@600&family=Noto+Color+Emoji&display=swap');

        /* 2. Forzamos los emojis a color en las clases que los usan */
        .card-emoji, #overlay-emoji, .stats, #feedback-msg, .heart {
            font-family: 'Noto Color Emoji', 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif !important;
            font-weight: 400 !important; 
            font-style: normal !important;
            color: initial !important; 
        }

        :root {
            --bg-body: #2d3436;
            --green-zone: #00b894;
            --red-zone: #ff7675;
            --card-bg: #ffffff;
            --text-color: #2d3436;
        }

        body {
            background-color: var(--bg-body);
            /* Añadimos Noto Color Emoji como respaldo general también */
            font-family: 'Open Sans', 'Noto Color Emoji', sans-serif;
            margin: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; touch-action: none; user-select: none;
        }
