<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ant Adventure - Supervivencia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800;900&display=swap');

        :root {
            --forest-accent: #0be881;
            --gold: #ffd32a;
            --danger: #ff4757;
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0; 
            background: radial-gradient(circle at center, #2f3640 0%, #111418 100%);
            font-family: 'Nunito', sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* --- CONTENEDOR DIORAMA --- */
        #game-container {
            position: relative; width: 660px; height: 495px;
            background-color: #27ae60;
            background-image: url('https://media.istockphoto.com/id/486620678/es/vector/fondo-de-hierba.jpg?s=612x612&w=0&k=20&c=J20Yff_T3pgJsCCLBC4hteRsbXibP0cpwkomouKvMF0=');
            background-size: cover; background-position: center;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 8px #1e272e, inset 0 0 0 12px #34495e;
            overflow: hidden;
        }

        canvas { position: absolute; top: 0; left: 0; display: block; border-radius: 20px; }

        /* --- UI MAGICAL GLASS --- */
        #ui-layer {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; pointer-events: none;
        }

        .glass-stat {
            background: rgba(30, 39, 46, 0.85); backdrop-filter: blur(8px);
            padding: 5px 20px; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); text-align: center;
            border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2);
        }

        .stat-val { font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--gold); display: block; text-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .stat-lbl { font-size: 0.6rem; font-weight: 900; color: #d2dae2; text-transform: uppercase; letter-spacing: 1px;}

        #timer-box .stat-val { color: #ff5e57; }

        /* --- BARRA DE VIDA --- */
        #health-box { display: flex; flex-direction: column; align-items: center; }
        #health-bar { display: flex; gap: 5px; margin-top: 5px; }
        .hp-segment { 
            width: 20px; height: 10px; background: #2ecc71; 
            border-radius: 3px; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.3);
            transition: 0.3s;
        }
        .hp-lost { background: #e74c3c; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.5); }

        /* --- PANTALLAS (OVERLAYS) --- */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(17, 20, 24, 0.9); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; text-align: center; padding: 20px;
        }

        h1 { font-family: 'Fredoka One', cursive; color: var(--forest-accent); margin-bottom: 5px; font-size: 3rem; text-shadow: 0 5px 15px rgba(11, 232, 129, 0.4); line-height: 1.1; }
        p { color: #d2dae2; font-weight: 600; font-size: 1rem; margin-bottom: 20px; max-width: 90%; }

        button {
            background: linear-gradient(135deg, #0fb9b1, #20bf6b); color: white; border: none;
            padding: 12px 40px; border-radius: 50px; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 20px rgba(32, 191, 107, 0.4), inset 0 -4px 0 rgba(0,0,0,0.1);
        }
        button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 15px 25px rgba(32, 191, 107, 0.5); }

        /* --- TABLA DE RÉCORDS --- */
        #records-table {
            width: 80%; max-width: 300px; margin-bottom: 20px;
            border-collapse: collapse; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden;
        }
        #records-table th { background: #34495e; color: #f1c40f; padding: 8px; font-family: 'Fredoka One'; font-size: 0.9rem;}
        #records-table td { padding: 8px; color: white; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); }
        #records-table tr:last-child td { border-bottom: none; }

        #watermark { margin-top: 15px; font-size: 12px; font-weight: 800; color: rgba(255,255,255,0.2); }
        @media (max-width: 680px) { #game-container { width: 95vw; height: 90vh; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="bgCanvas"></canvas>
        <canvas id="gameCanvas"></canvas>

        <div id="ui-layer">
            <div class="glass-stat">
                <span class="stat-lbl">Bayas</span>
                <span class="stat-val" id="score-val">0</span>
            </div>
            <div class="glass-stat" id="health-box">
                <span class="stat-lbl">Salud (<span id="hp-text">3/3</span>)</span>
                <div id="health-bar">
                    <div class="hp-segment" id="hp-1"></div>
                    <div class="hp-segment" id="hp-2"></div>
                    <div class="hp-segment" id="hp-3"></div>
                </div>
            </div>
            <div class="glass-stat" id="timer-box">
                <span class="stat-lbl">Tiempo</span>
                <span class="stat-val" id="time-val">02:30</span>
            </div>
        </div>

        <div id="start-screen" class="overlay">
            <h1>BOSQUE<br>PELIGROSO</h1>
            <p>Recolecta las bayas. ¡Cuidado con la hormiga roja! Sobrevive 2 minutos y medio.</p>
            <button onclick="startGame()">INICIAR AVENTURA</button>
        </div>

        <div id="end-screen" class="overlay" style="display:none;">
            <h1 id="end-title" style="color: #ff5e57;">FIN DEL JUEGO</h1>
            <p id="end-msg"></p>
            
            <table id="records-table">
                <thead><tr><th>PUESTO</th><th>PUNTOS</th></tr></thead>
                <tbody id="records-body"></tbody>
            </table>

            <button onclick="location.reload()">VOLVER A JUGAR</button>
        </div>
    </div>

    <div id="watermark">Creado por el Prof. Gastón</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');

    let w, h;
    let score = 0;
    let timeLeft = 150; // 2 minutos y 30 segundos
    let gameActive = false;
    let particles = [], crumbs = [], fireflies = [];
    
    // --- VARIABLES DE VIDA ---
    let playerLives = 3; 
    let isInvulnerable = 0; 
    
    const ant = { x: 400, y: 300, targetX: 400, targetY: 300, angle: 0, speed: 0, maxSpeed: 4, accel: 0.3, hasFood: false };
    
    // --- HORMIGA ROJA ---
    const redAnt = { 
        x: 100, y: 100, targetX: 100, targetY: 100, angle: 0, speed: 0, 
        maxSpeed: 2.3, // Velocidad ligeramente aumentada para mayor desafío
        accel: 0.18,   // Aceleración ligeramente mejorada
        state: 'wander',
        wanderTimer: 0
    };

    const nest = { x: 330, y: 247.5, radius: 35 };
    
    // Imagen del montículo cargada localmente
    const nestImg = new Image();
    nestImg.src = "Hormi.png";

    function init() {
        w = canvas.width = bgCanvas.width = 660;
        h = canvas.height = bgCanvas.height = 495;
        
        if(nestImg.complete) drawEnvironment();
        else nestImg.onload = drawEnvironment;
        
        initFireflies();
    }

    function drawEnvironment() {
        bgCtx.clearRect(0,0,w,h); 
        const rayGrad = bgCtx.createLinearGradient(0, 0, w, h);
        rayGrad.addColorStop(0, 'rgba(255, 234, 167, 0.2)');
        rayGrad.addColorStop(0.5, 'rgba(255, 234, 167, 0.05)');
        rayGrad.addColorStop(1, 'rgba(255, 234, 167, 0)');
        bgCtx.fillStyle = rayGrad;
        bgCtx.beginPath(); bgCtx.moveTo(0,0); bgCtx.lineTo(w/2, 0); bgCtx.lineTo(w, h); bgCtx.lineTo(w/2, h); bgCtx.fill();

        // Dibujar el hormiguero
        bgCtx.save();
        bgCtx.drawImage(nestImg, nest.x - 50, nest.y - 35, 100, 75);
        bgCtx.restore();

        // Agujero central oscuro (entrada del nido)
        bgCtx.fillStyle = 'rgba(10, 5, 3, 0.8)';
        bgCtx.beginPath(); bgCtx.ellipse(nest.x, nest.y - 10, 10, 4, 0, 0, Math.PI*2); bgCtx.fill();
        
        // Viñeteado
        const vigGrad = bgCtx.createRadialGradient(w/2, h/2, h/3, w/2, h/2, w/1.2);
        vigGrad.addColorStop(0, 'rgba(0,0,0,0)'); vigGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
        bgCtx.fillStyle = vigGrad; bgCtx.fillRect(0,0,w,h);
    }

    function initFireflies() {
        for(let i=0; i<15; i++) {
            fireflies.push({ x: Math.random()*w, y: Math.random()*h, angle: Math.random() * Math.PI*2, speed: 0.2 + Math.random()*0.5, pulse: Math.random() * Math.PI*2 });
        }
    }

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        gameActive = true; score = 0; spawnCrumbs(5); requestAnimationFrame(update);
        
        let timer = setInterval(() => {
            if(!gameActive) { clearInterval(timer); return; }
            timeLeft--;
            const m = Math.floor(timeLeft/60); const s = timeLeft%60;
            document.getElementById('time-val').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            if(timeLeft <= 0) endGame("¡Tiempo agotado!");
        }, 1000);
    }

    function spawnCrumbs(num) {
        for(let i=0; i<num; i++) crumbs.push({ x: 40 + Math.random()*(w-80), y: 40 + Math.random()*(h-80), offsetY: Math.random() * Math.PI * 2 });
    }

    canvas.addEventListener('mousedown', (e) => setTarget(e.offsetX, e.offsetY));
    canvas.addEventListener('touchstart', (e) => { const rect = canvas.getBoundingClientRect(); setTarget(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top); });

    function setTarget(x, y) { ant.targetX = x; ant.targetY = y; createParticles(x, y, '#0be881', 5); }

    function update() {
        if(!gameActive) return;

        // --- MOVIMIENTO JUGADOR ---
        const dx = ant.targetX - ant.x; const dy = ant.targetY - ant.y; const dist = Math.hypot(dx, dy);
        if(dist > 5) {
            let diff = Math.atan2(dy, dx) - ant.angle;
            while (diff < -Math.PI) diff += Math.PI * 2; while (diff > Math.PI) diff -= Math.PI * 2;
            ant.angle += diff * 0.2; 
            ant.speed = Math.min(ant.speed + ant.accel, ant.maxSpeed);
            ant.x += Math.cos(ant.angle) * ant.speed; ant.y += Math.sin(ant.angle) * ant.speed;
        } else { ant.speed *= 0.7; }
        ant.x = Math.max(15, Math.min(w - 15, ant.x)); ant.y = Math.max(15, Math.min(h - 15, ant.y));

        // --- I.A. HORMIGA ROJA MEJORADA ---
        const distToPlayer = Math.hypot(ant.x - redAnt.x, ant.y - redAnt.y);
        
        // Detección (37px)
        if(distToPlayer < 37) {
            redAnt.state = 'chase';
            redAnt.targetX = ant.x; redAnt.targetY = ant.y;
        } else {
            redAnt.state = 'wander';
            redAnt.wanderTimer--;
            
            // Lógica de patrullaje inteligente actualizada
            if(redAnt.wanderTimer <= 0) {
                let strategy = Math.random();
                
                if (strategy < 0.6) {
                    // 60% de probabilidad: Merodear cerca del jugador (acecho)
                    redAnt.targetX = Math.max(30, Math.min(w-30, ant.x + (Math.random()-0.5)*150));
                    redAnt.targetY = Math.max(30, Math.min(h-30, ant.y + (Math.random()-0.5)*150));
                } else if (strategy < 0.8) {
                    // 20% de probabilidad: Patrullar alrededor del nido (defensa)
                    redAnt.targetX = nest.x + (Math.random()-0.5)*120;
                    redAnt.targetY = nest.y + (Math.random()-0.5)*120;
                } else {
                    // 20% de probabilidad: Caminar a un lugar aleatorio
                    redAnt.targetX = 30 + Math.random()*(w-60); 
                    redAnt.targetY = 30 + Math.random()*(h-60);
                }
                
                // Cambia de dirección frecuentemente para verse más activa
                redAnt.wanderTimer = 40 + Math.random()*50; 
            }
        }

        const edx = redAnt.targetX - redAnt.x; const edy = redAnt.targetY - redAnt.y; const edist = Math.hypot(edx, edy);
        if(edist > 5) {
            let ediff = Math.atan2(edy, edx) - redAnt.angle;
            while (ediff < -Math.PI) ediff += Math.PI * 2; while (ediff > Math.PI) ediff -= Math.PI * 2;
            redAnt.angle += ediff * 0.1;
            redAnt.speed = Math.min(redAnt.speed + redAnt.accel, redAnt.maxSpeed);
            redAnt.x += Math.cos(redAnt.angle) * redAnt.speed; redAnt.y += Math.sin(redAnt.angle) * redAnt.speed;
        }

        // --- COLISIÓN DE DAÑO (1/3 de vida) ---
        if(isInvulnerable > 0) isInvulnerable--;
        
        if(distToPlayer < 35 && isInvulnerable <= 0) {
            isInvulnerable = 90; 
            createParticles(ant.x, ant.y, '#e74c3c', 15); 
            
            // Fuerte empujón al jugador
            ant.x -= Math.cos(redAnt.angle) * 45;
            ant.y -= Math.sin(redAnt.angle) * 45;
            ant.targetX = ant.x; ant.targetY = ant.y; 

            // Se pierde 1 de 3
            playerLives--;
            document.getElementById('hp-' + (playerLives + 1)).classList.add('hp-lost');
            document.getElementById('hp-text').innerText = playerLives + '/3';
            
            if(playerLives <= 0) endGame("¡La hormiga roja te ha devorado!");
        }

        // --- COLISIONES COMIDA Y NIDO ---
        crumbs.forEach((c, i) => {
            if(Math.hypot(c.x - ant.x, c.y - ant.y) < 22 && !ant.hasFood) {
                ant.hasFood = true; crumbs.splice(i, 1);
                createParticles(ant.x, ant.y, '#ff4757', 12); spawnCrumbs(1);
            }
        });

        if(Math.hypot(nest.x - ant.x, nest.y - ant.y) < nest.radius - 10 && ant.hasFood) {
            ant.hasFood = false; score += 1; document.getElementById('score-val').innerText = score;
            createParticles(nest.x, nest.y, '#ffd32a', 15); 
            const scoreEl = document.getElementById('score-val');
            scoreEl.style.transform = 'scale(1.5)'; setTimeout(() => scoreEl.style.transform = 'scale(1)', 200);
        }
        
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0,0,w,h);

        fireflies.forEach(f => {
            f.x += Math.cos(f.angle) * f.speed; f.y += Math.sin(f.angle) * f.speed;
            f.angle += (Math.random() - 0.5) * 0.1; f.pulse += 0.05;
            if(f.x<0 || f.x>w) f.angle = Math.PI - f.angle; if(f.y<0 || f.y>h) f.angle = -f.angle;
            let alpha = 0.3 + Math.sin(f.pulse) * 0.3;
            ctx.fillStyle = `rgba(255, 234, 167, ${alpha})`; ctx.shadowColor = '#ffeaa7'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(f.x, f.y, 2, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0; 
        });

        let time = Date.now() / 250;
        crumbs.forEach(c => {
            let floatY = Math.sin(time + c.offsetY) * 3;
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(c.x, c.y + 8, 8, 3, 0, 0, Math.PI*2); ctx.fill();
            ctx.shadowColor = '#ff4757'; ctx.shadowBlur = 15; ctx.fillStyle = '#ff4757';
            ctx.beginPath(); ctx.arc(c.x, c.y + floatY, 7, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(c.x - 2, c.y - 2 + floatY, 2.5, 0, Math.PI*2); ctx.fill();
        });

        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.03;
            if(p.life <= 0) { particles.splice(i, 1); return; }
            ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
        });

        // JUGADOR (Parpadeo al recibir daño)
        if(isInvulnerable === 0 || Math.floor(Date.now() / 100) % 2 === 0) drawAnt(ant, '#1e272e', '#111');
        
        // ENEMIGO
        drawAnt(redAnt, '#c0392b', '#922b21', true);
    }

    function drawAnt(entity, bodyColor, legColor, isEnemy = false) {
        ctx.save(); ctx.translate(entity.x, entity.y); ctx.rotate(entity.angle);
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(-2, 4, 18, 10, 0, 0, Math.PI*2); ctx.fill();

        ctx.strokeStyle = legColor; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        let walk = entity.speed > 0.5 ? Math.sin(Date.now() / 50) * 5 : 0; 
        ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(10 + walk, -14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(4, 0); ctx.lineTo(10 - walk, 14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-2 - walk, -16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(-2 + walk, 16); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-12 + walk, -14); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(-8, 0); ctx.lineTo(-12 - walk, 14); ctx.stroke();

        ctx.fillStyle = bodyColor;
        ctx.beginPath(); ctx.ellipse(-10, 0, 10, 8, 0, 0, Math.PI*2); ctx.fill(); 
        ctx.beginPath(); ctx.ellipse(0, 0, 6, 5, 0, 0, Math.PI*2); ctx.fill();  
        ctx.beginPath(); ctx.ellipse(10, 0, 8, 7, 0, 0, Math.PI*2); ctx.fill();  

        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath(); ctx.ellipse(-12, -3, 4, 2, Math.PI/6, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(9, -2, 3, 1.5, Math.PI/6, 0, Math.PI*2); ctx.fill(); 

        ctx.strokeStyle = legColor; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(15, -2); ctx.quadraticCurveTo(22, -10, 24, -5); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(15, 2); ctx.quadraticCurveTo(22, 10, 24, 5); ctx.stroke();

        if(isEnemy) {
            ctx.fillStyle = '#f1c40f'; 
            ctx.beginPath(); ctx.arc(11, -3, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(11, 3, 1.5, 0, Math.PI*2); ctx.fill();
        }

        if(entity.hasFood) {
            ctx.shadowColor = '#ff4757'; ctx.shadowBlur = 10; ctx.fillStyle = '#ff4757';
            ctx.beginPath(); ctx.arc(19, 0, 7, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.beginPath(); ctx.arc(17, -2, 2, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    function createParticles(x, y, color, amount) {
        for(let i=0; i<amount; i++) {
            particles.push({ x, y, color, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, life: 1, size: 2 + Math.random()*4 });
        }
    }

    function saveAndDisplayRecords(currentScore) {
        let scores = JSON.parse(localStorage.getItem('antRecords')) || [];
        scores.push(currentScore);
        scores.sort((a, b) => b - a);
        scores = scores.slice(0, 5);
        localStorage.setItem('antRecords', JSON.stringify(scores));

        const tbody = document.getElementById('records-body');
        tbody.innerHTML = '';
        scores.forEach((s, index) => {
            let tr = document.createElement('tr');
            if(s === currentScore) tr.style.color = '#0be881';
            tr.innerHTML = `<td>#${index + 1}</td><td>${s} Bayas</td>`;
            tbody.appendChild(tr);
        });
    }

    function endGame(reason) {
        gameActive = false; 
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('end-title').innerText = reason;
        document.getElementById('end-msg').innerHTML = `Llevaste <b style="color:var(--gold); font-size:1.2rem;">${score} bayas</b> al nido.`;
        saveAndDisplayRecords(score);
    }

    init();
</script>
</body>
</html>
