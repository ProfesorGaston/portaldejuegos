<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Relojito - Prof. Gastón</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Open+Sans:wght@600&display=swap');

        :root {
            --bg-color: #a8e6cf;
            --clock-face: #fff;
            --clock-border: #34495e;
            --hand-hour: #e74c3c;
            --hand-min: #2c3e50;
        }

        body {
            background-color: #2c3e50;
            font-family: 'Open Sans', sans-serif;
            margin: 0; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; user-select: none;
        }

        .watermark {
            position: fixed; bottom: 10px; right: 15px;
            color: rgba(255, 255, 255, 0.3); font-family: 'Fredoka One'; font-size: 0.9rem;
            pointer-events: none; z-index: 999;
        }

        /* --- MARCO TIPO TV RETRO --- */
        #game-frame {
            width: 95%; max-width: 500px;
            height: 95vh; max-height: 700px;
            background: radial-gradient(circle at center, #81ecec 0%, #00cec9 100%);
            border-radius: 30px;
            border: 8px solid #dfe6e9;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
            padding: 10px; box-sizing: border-box;
            justify-content: space-between; 
            padding-bottom: 30px;
        }

        header {
            width: 100%; text-align: center; margin-top: 10px; z-index: 10;
        }
        h1 {
            font-family: 'Fredoka One'; color: white;
            font-size: 2rem; margin: 0;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.15);
        }
        
        .level-indicator {
            display: flex; justify-content: center; gap: 5px; margin-bottom: 5px;
        }
        .dot {
            width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%;
        }
        .dot.active { background: #f1c40f; box-shadow: 0 0 5px #f1c40f; transform: scale(1.2); }

        .status-bar {
            background: rgba(255,255,255,0.3);
            padding: 4px 15px; border-radius: 20px;
            display: inline-flex; gap: 15px; margin-top: 5px;
            font-weight: bold; color: #2d3436; font-family: 'Fredoka One';
        }

        /* --- RELOJ ANALÓGICO --- */
        .clock-container {
            width: 240px; height: 240px;
            background: var(--clock-face);
            border-radius: 50%;
            border: 12px solid var(--clock-border);
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            flex-shrink: 0; /* EVITA APLASTAMIENTO */
            margin: 10px 0;
        }

        /* Números generados por JS */
        .clock-number {
            position: absolute;
            width: 30px; height: 30px;
            text-align: center; line-height: 30px;
            font-family: 'Fredoka One'; color: #2d3436; font-size: 1.2rem;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
        }

        /* Agujas */
        .hand {
            position: absolute; bottom: 50%; left: 50%;
            transform-origin: bottom center;
            border-radius: 5px 5px 0 0;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: transform 1s cubic-bezier(0.4, 2.5, 0.5, 0.8);
        }
        .hour-hand {
            width: 8px; height: 60px; background: var(--hand-hour);
            margin-left: -4px; z-index: 2;
        }
        .min-hand {
            width: 6px; height: 90px; background: var(--hand-min);
            margin-left: -3px; z-index: 3;
        }
        .center-dot {
            position: absolute; top: 50%; left: 50%;
            width: 16px; height: 16px; background: #333;
            border-radius: 50%; transform: translate(-50%, -50%);
            z-index: 4; border: 3px solid #e74c3c;
        }

        /* --- BOTONES --- */
        #options-area {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            width: 100%; max-width: 360px;
        }
        
        .digital-btn {
            background: white;
            border: none; border-radius: 15px;
            padding: 10px; font-family: 'Courier New', monospace;
            font-size: 1.8rem; font-weight: bold; color: #2d3436;
            box-shadow: 0 6px 0 #b2bec3;
            cursor: pointer; transition: transform 0.1s;
        }
        .digital-btn:active { transform: translateY(6px); box-shadow: none; }
        .correct { background: #2ecc71 !important; color: white !important; box-shadow: 0 6px 0 #27ae60 !important; }
        .wrong { background: #e74c3c !important; color: white !important; animation: shake 0.4s; }

        #mascot {
            position: absolute; bottom: 5px; left: 10px;
            font-size: 3.5rem; z-index: 0; opacity: 0.9;
            transform: rotate(-10deg); pointer-events: none;
        }

        /* MODALES */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; color: white;
        }
        .modal-btn {
            padding: 15px 30px; font-size: 1.5rem; background: #f1c40f; color: #2c3e50;
            border: none; border-radius: 50px; cursor: pointer; font-family: 'Fredoka One';
            margin-top: 20px; box-shadow: 0 5px 0 #d35400;
        }

        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }
        
    </style>
</head>
<body>

    <div class="watermark">Creado por el Prof. Gastón</div>

    <div id="game-frame">
        <header>
            <h1>⏰ El Relojito</h1>
            <div class="level-indicator">
                <div class="dot active" id="dot1"></div>
                <div class="dot" id="dot2"></div>
                <div class="dot" id="dot3"></div>
                <div class="dot" id="dot4"></div>
                <div class="dot" id="dot5"></div>
            </div>
            <div class="status-bar">
                <span id="lvl-name">Nivel 1</span>
                <span>Ronda: <span id="round-display">1</span>/7</span>
            </div>
        </header>

        <div class="clock-container" id="clock-face">
            <div class="hand hour-hand" id="h-hand"></div>
            <div class="hand min-hand" id="m-hand"></div>
            <div class="center-dot"></div>
        </div>

        <div id="options-area"></div>

        <div id="mascot">🦉</div>
        
        <div id="level-modal" class="modal-overlay">
            <div style="font-size:4rem">🌟</div>
            <h1>¡Nivel Completado!</h1>
            <p id="lvl-msg">¡Excelente trabajo!</p>
            <button class="modal-btn" onclick="nextLevel()">Siguiente</button>
        </div>

        <div id="victory-modal" class="modal-overlay">
            <div style="font-size:4rem">🏆</div>
            <h1>¡GRAN MAESTRO!</h1>
            <p>Completaste los 5 niveles.</p>
            <button class="modal-btn" onclick="location.reload()">Jugar de nuevo</button>
        </div>
    </div>

<script>
    // --- CONFIGURACIÓN DEL JUEGO ---
    const TOTAL_LEVELS = 5;
    const ROUNDS_PER_LEVEL = 7;
    
    let currentLevel = 1;
    let currentRound = 1;
    let targetHour = 0;
    let targetMin = 0;
    let canClick = true;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);

        if(type === 'correct') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth'; osc.frequency.value = 150;
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'tick') {
            osc.type = 'square'; osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    }

    // --- GEOMETRÍA DEL RELOJ ---
    function drawClockNumbers() {
        const clockFace = document.getElementById('clock-face');
        const radius = 95; 
        
        for (let i = 1; i <= 12; i++) {
            const numDiv = document.createElement('div');
            numDiv.className = 'clock-number';
            numDiv.innerText = i;
            // Trigonometría para posición perfecta
            const angle = (i * 30) * (Math.PI / 180);
            const x = Math.sin(angle) * radius;
            const y = -Math.cos(angle) * radius;
            numDiv.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
            clockFace.appendChild(numDiv);
        }
    }

    function initGame() {
        drawClockNumbers();
        updateUI();
        generateRound();
    }

    function updateUI() {
        document.getElementById('lvl-name').innerText = "Nivel " + currentLevel;
        document.getElementById('round-display').innerText = currentRound;
        
        // Actualizar puntos
        for(let i=1; i<=5; i++) {
            const d = document.getElementById('dot'+i);
            if(i < currentLevel) { d.className = "dot"; d.style.background = "#2ecc71"; } // Pasado
            else if(i === currentLevel) { d.className = "dot active"; } // Actual
            else { d.className = "dot"; } // Futuro
        }
    }

    function generateRound() {
        canClick = true;
        
        // 1. Generar Hora (1-12)
        targetHour = Math.floor(Math.random() * 12) + 1;

        // 2. Generar Minutos SEGÚN NIVEL (Progresión)
        let possibleMins = [];
        
        switch(currentLevel) {
            case 1: // Muy fácil: En punto
                possibleMins = [0]; 
                break;
            case 2: // Fácil: En punto y media
                possibleMins = [0, 30]; 
                break;
            case 3: // Intermedio: Cuartos
                possibleMins = [0, 15, 30, 45]; 
                break;
            case 4: // Difícil: Cada 10 mins
                possibleMins = [0, 10, 20, 30, 40, 50]; 
                break;
            case 5: // Experto: Cada 5 mins
                possibleMins = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55]; 
                break;
        }
        
        targetMin = possibleMins[Math.floor(Math.random() * possibleMins.length)];

        setClockHands(targetHour, targetMin);
        playSound('tick');
        generateOptions(possibleMins);
    }

    function setClockHands(h, m) {
        const minDeg = m * 6;
        // La hora avanza proporcionalmente a los minutos
        const hourDeg = (h % 12) * 30 + (m * 0.5);

        document.getElementById('m-hand').style.transform = `rotate(${minDeg}deg)`;
        document.getElementById('h-hand').style.transform = `rotate(${hourDeg}deg)`;
    }

    function formatTime(h, m) {
        const mm = m < 10 ? '0'+m : m;
        const hh = h < 10 ? '0'+h : h;
        return `${hh}:${mm}`;
    }

    function generateOptions(minutePool) {
        const container = document.getElementById('options-area');
        container.innerHTML = '';

        let options = [{ h: targetHour, m: targetMin, correct: true }];

        while(options.length < 4) {
            let fakeH = Math.floor(Math.random() * 12) + 1;
            // Usamos el mismo pool de minutos del nivel para que sea difícil
            let fakeM = minutePool[Math.floor(Math.random() * minutePool.length)];

            // Evitar duplicados exactos
            const exists = options.some(o => o.h === fakeH && o.m === fakeM);
            if(!exists) {
                options.push({ h: fakeH, m: fakeM, correct: false });
            }
        }

        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'digital-btn';
            btn.innerText = formatTime(opt.h, opt.m);
            btn.onclick = (e) => checkAnswer(opt, e.target);
            container.appendChild(btn);
        });
    }

    function checkAnswer(optionData, btnElement) {
        if(!canClick) return;

        if(optionData.correct) {
            canClick = false;
            btnElement.classList.add('correct');
            playSound('correct');
            
            setTimeout(() => {
                currentRound++;
                if(currentRound > ROUNDS_PER_LEVEL) {
                    showLevelModal();
                } else {
                    updateUI();
                    generateRound();
                }
            }, 1000);

        } else {
            btnElement.classList.add('wrong');
            playSound('wrong');
            setTimeout(() => btnElement.classList.remove('wrong'), 500);
        }
    }

    function showLevelModal() {
        if(currentLevel >= TOTAL_LEVELS) {
            document.getElementById('victory-modal').style.display = 'flex';
        } else {
            const msgs = ["¡Bien hecho!", "¡Sigue así!", "¡Ya eres un experto!", "¡Casi un maestro!"];
            document.getElementById('lvl-msg').innerText = msgs[currentLevel-1] || "¡Genial!";
            document.getElementById('level-modal').style.display = 'flex';
        }
    }

    function nextLevel() {
        document.getElementById('level-modal').style.display = 'none';
        currentLevel++;
        currentRound = 1;
        updateUI();
        generateRound();
    }

    initGame();

</script>
</body>
</html>
